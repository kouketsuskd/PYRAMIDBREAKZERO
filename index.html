<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#02040a">
<title>PYRAMID BREAK ZERO - DAYBREAK XIII</title>
<style>
*{box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
body{display:grid;place-items:center}
#wrap{position:relative;width:100vw;height:100dvh;background:#000}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;touch-action:none}
.overlay{position:absolute;inset:0;z-index:20;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at 50% 30%,#243a62,#060811 62%,#010103)}
.card{width:min(92vw,560px);padding:24px;border:4px solid #fff;background:#020306f2;text-align:center;box-shadow:0 0 40px #000}
.logo{font-size:clamp(30px,8vw,58px);font-weight:1000;line-height:.9;text-shadow:5px 5px 0 #17355d}.logo b{color:#ffd75a}
button{margin-top:18px;padding:14px 26px;border:3px solid #fff;background:#05070d;color:#fff;font:900 19px monospace}
.small{font-size:12px;line-height:1.7;color:#c8d4e2}.hidden{display:none!important}
#rotate{display:none;position:absolute;inset:0;z-index:50;background:#000;place-items:center;text-align:center;padding:28px;font-weight:900}
@media(orientation:landscape) and (max-height:850px){#rotate{display:grid}}
</style>
</head>
<body>
<div id="wrap">
<canvas id="game" width="540" height="960"></canvas>
<div id="start" class="overlay"><div class="card">
<div class="logo">PYRAMID BREAK ZERO<br><b>DAYBREAK XIII</b></div>
<p>超長期ボス戦・シネマティック版</p>
<button id="go">物語を始める</button>
<p class="small">ボスHP 300,000／5段階変形／30系統の攻撃。<br>縦画面専用。敵ターンはハートを指でドラッグ。</p>
</div></div>
<div id="end" class="overlay hidden"><div class="card">
<div class="logo" id="endTitle">DAYBREAK</div><p id="endText"></p><button id="again">もう一度</button>
</div></div>
<div id="rotate">iPhoneを縦向きにしてください</div>
</div>
<script>
(()=>{"use strict";
const cv=document.getElementById("game"),g=cv.getContext("2d");
g.imageSmoothingEnabled=false;
const W=540,H=960,arena={x:34,y:305,w:472,h:405};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),rnd=(a,b)=>a+Math.random()*(b-a);
const actions=["たたかう","わざ","どうぐ","まもる","はなす","こうたい"];

let state="BOOT",sub="none",last=0,time=0,turn=0,active=0,selected=0,bond=0,score=0;
let dialog=[],dialogIndex=0,dialogNext=null;
let attackX=70,attackDir=1,attackTime=0,attackHits=0,attackTotal=0,attackEnded=false;
let bullets=[],particles=[],damageText=[],trails=[],hitRects=[];
let defenseTime=0,patternId=0,patternClock=0,dragging=false,shake=0,flash=0,message="",messageTime=0;
let phaseShown=1,forecastTurns=0,timeStopTurns=0,barrierTurns=0,critTurns=0,oniTurns=0;
let skillUsed=[0,0,0,0,0,0],permanentDead=[false,false,false,false,false,false];
let attackBoost=[1,1,1,1,1,1],stunTurns=[0,0,0,0,0,0];
let audio=null,musicTimer=null,musicStep=0;
let bossFx={hover:0,wing:0,hit:0,roar:0,transform:0,handL:0,handR:0,charge:0,coreOpen:0,dash:0,reach:0,cinema:0,cinemaType:"",cinemaName:"",cinemaQuote:"",cinemaColor:"#fff"};

const party=[
{name:"トシユキ",max:120,hp:120,mp:75,mm:75,c:"#725fbd",skill:"ザ・ワールド",pow:22},
{name:"カズアキ",max:195,hp:195,mp:50,mm:50,c:"#805044",skill:"ワールド・イズ・マイン",pow:39},
{name:"マッピー",max:125,hp:125,mp:90,mm:90,c:"#d0aa60",skill:"ピラミッド・ハート",pow:18},
{name:"ケイタ",max:135,hp:135,mp:78,mm:78,c:"#ef9432",skill:"鳳翼天翔",pow:29},
{name:"イサジ",max:185,hp:185,mp:46,mm:46,c:"#edc650",skill:"領域展開・鬼",pow:36},
{name:"リョウゴ",max:140,hp:140,mp:82,mm:82,c:"#438fca",skill:"虫の知らせ",pow:26}
];
const boss={name:"機械天使 アルカ・セラフ 完全体",max:300000,hp:300000,phase:1,armor:420};
const items={herb:1};
const heart={x:270,y:515,r:10,inv:0,ox:0,oy:0};

function ac(){if(!audio)audio=new(window.AudioContext||window.webkitAudioContext)}
function beep(f=220,d=.08,t="sine",v=.025){if(!audio)return;const o=audio.createOscillator(),a=audio.createGain();o.type=t;o.frequency.value=f;a.gain.value=v;o.connect(a);a.connect(audio.destination);o.start();a.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+d);o.stop(audio.currentTime+d)}
function music(){if(musicTimer)return;const seq=[196,247,294,330,294,247,220,196,220,277,330,392,330,277,247,220];musicTimer=setInterval(()=>{if(state==="END")return;beep(seq[musicStep++%seq.length],.17,state==="DEFENSE"?"triangle":"sine",state==="DEFENSE"?.014:.018)},170)}
function setState(s){state=s;selected=0}
function say(lines,next){dialog=Array.isArray(lines)?lines:[lines];dialogIndex=0;dialogNext=next||null;sub="dialog"}
function nextDialog(){dialogIndex++;if(dialogIndex>=dialog.length){const n=dialogNext;dialog=[];dialogNext=null;sub="none";if(n)n()}}
function toast(s,t=1){message=s;messageTime=t}
function current(){
 if(party[active].hp<=0||permanentDead[active]){
  const i=party.findIndex((p,j)=>p.hp>0&&!permanentDead[j]);
  active=i<0?0:i;
 }
 return party[active]
}
function aliveCount(){return party.filter((p,i)=>p.hp>0&&!permanentDead[i]).length}
function reset(){
 party.forEach(p=>{p.hp=p.max;p.mp=p.mm});
 Object.assign(boss,{hp:boss.max,phase:1,armor:420});
 items.herb=1;turn=0;active=0;selected=0;bond=0;score=0;
 skillUsed=[0,0,0,0,0,0];permanentDead=[false,false,false,false,false,false];
 forecastTurns=timeStopTurns=barrierTurns=critTurns=oniTurns=0;attackBoost=[1,1,1,1,1,1];stunTurns=[0,0,0,0,0,0];
 bullets=[];particles=[];damageText=[];trails=[];shake=flash=0;phaseShown=1;
 bossFx={hover:0,wing:0,hit:0,roar:0,transform:0,handL:0,handR:0,charge:0,coreOpen:0,dash:0,reach:0,cinema:0,cinemaType:"",cinemaName:"",cinemaQuote:"",cinemaColor:"#fff"};
 setState("MENU");
 say(["――空から、壊れた神が落ちてきた。","機械天使の生命値は300,000。共有のやくそうは、たった一つ。","復活アイテムはない。必殺技は全員一度だけ。","トシユキ「順番を間違えれば負ける。でも、考えれば届く。」"],()=>setState("MENU"));
}
function particle(x,y,c,n=14,pow=1){for(let i=0;i<n;i++)particles.push({x,y,vx:rnd(-170,170)*pow,vy:rnd(-220,80)*pow,l:rnd(.3,.75),c,s:rnd(2,6)})}

function startCinematic(type,name,quote,color){
 bossFx.cinema=2.2;bossFx.cinemaType=type;bossFx.cinemaName=name;bossFx.cinemaQuote=quote;bossFx.cinemaColor=color;
 flash=.18;shake=18;particle(270,470,color,38,1.5);
}
function skillLimit(i){return i===5?3:1}
function damageBoss(raw){
 const n=Math.max(1,Math.floor(raw-boss.armor));
 boss.hp=Math.max(0,boss.hp-n);score+=n*10;bossFx.hit=.35;shake=12;flash=.08;
 damageText.push({x:270,y:190,l:1.1,n,crit:n>=3000});particle(270,190,"#fff",22,1.2);beep(80,.15,"square",.06);
 if(boss.hp<=0)finishBattle();
}
function hurt(n){
 if(barrierTurns>0)n=Math.ceil(n*.38);
 const p=current();p.hp=Math.max(0,p.hp-n);
 if(p.hp<=0){const next=party.findIndex((q,i)=>q.hp>0&&!permanentDead[i]);if(next<0)return gameOver();active=next}
}
function chooseAction(i){
 if(sub==="dialog")return;
 if(i===0){setState("ATTACK");attackX=70;attackDir=1;attackTime=3.6;attackHits=0;attackTotal=0;attackEnded=false}
 if(i===1)setState("SKILL");
 if(i===2)setState("ITEM");
 if(i===3){bond=Math.min(100,bond+10);toast("防御態勢：次の被ダメージ軽減",.9);barrierTurns=Math.max(barrierTurns,1);beginDefense()}
 if(i===4)talk();
 if(i===5)setState("SWITCH");
}
function useSkill(){
 const p=current(),i=active,limit=skillLimit(i);
 if(skillUsed[i]>=limit){toast("この必殺技はもう使えない",1);setState("MENU");return}
 skillUsed[i]++;
 const names=["ザ・ワールド","ワールド・イズ・マイン","ピラミッド・ハート","鳳翼天翔","領域展開・鬼","虫の知らせ"];
 const quotes=[
  "止まれ。世界。――仲間の鼓動だけは、進め。",
  "俺が世界を奪う。みんなが帰る時間を作るために。",
  "勝つためじゃない。全員で帰る場所を守る。",
  "この命は終わらない。みんなの朝に変わる。",
  "怒りじゃない。守りたいものが、俺を鬼にする。",
  "未来は決まっていない。見えた絶望を、選び直す。"
 ];
 startCinematic(["clock","slash","pyramid","phoenix","oni","future"][i],names[i],quotes[i],p.c);
 setState("SKILL_CINEMA");
 setTimeout(()=>{
  if(i===0){
   damageBoss(12920);timeStopTurns=6;p.mp=0;
   party.forEach((a,j)=>{if(!permanentDead[j])a.hp=Math.min(a.max,a.hp+45)});
   say(["世界から音が消えた。","トシユキ「六回の敵攻撃を消す。時間は止まっても、俺たちは止まらない。」"],nextTurn);return;
  }
  if(i===1){
   p.hp=1;boss.armor=0;critTurns=3;stunTurns[i]=2;damageBoss(22420);
   say(["カズアキは世界の境界を斬った。","三ターン、防御を無視する。カズアキは二ターン行動不能。"],beginDefense);return;
  }
  if(i===2){
   barrierTurns=3;party.forEach((a,j)=>{if(!permanentDead[j])a.hp=Math.min(a.max,a.hp+35)});damageBoss(7920);
   say(["巨大なピラミッドが六人を覆った。","三回の敵攻撃を大幅に軽減する。"],beginDefense);return;
  }
  if(i===3){
   damageBoss(10920);party.forEach((a,j)=>{if(j!==i&&!permanentDead[j])a.hp=a.max});
   p.hp=0;permanentDead[i]=true;
   say(["仲間全員の傷が消えた。","ケイタ「これで、みんな帰れる。」","鳳凰のあとに、ケイタの場所だけが空いていた。"],nextTurn);return;
  }
  if(i===4){
   p.hp=1;oniTurns=4;attackBoost[i]=6;damageBoss(15920);
   say(["イサジは命を一滴だけ残した。","四ターン、攻撃力六倍。鬼化中は回復できない。"],beginDefense);return;
  }
  if(i===5){
   forecastTurns=Math.max(forecastTurns,4);p.mp=0;damageBoss(8920);
   say([`未来視 ${skillUsed[i]}/3 回目。`,"次の四回の攻撃が青い予告線として見え、弾幕速度が低下する。"],beginDefense);return;
  }
 },1450);
}function useItem(){
 if(items.herb<=0){toast("やくそうはもうない",.9);setState("MENU");return}
 if(active===4&&oniTurns>0){toast("鬼化中のイサジには回復が届かない",1.1);setState("MENU");return}
 items.herb--;const p=current();p.hp=Math.min(p.max,p.hp+80);toast(`${p.name} HP+80　残り0`,1.2);beginDefense();
}
function talk(){
 const lines=[
 ["マッピー「君は、誰かに止めてほしいんじゃないのか？」","機械天使「命令に、願いは必要ない。」"],
 ["リョウゴ「未来には、君が泣いている姿が見える。」","機械天使「私は、泣く機能を持たない。」"],
 ["ケイタ「機能じゃなくても、痛いものは痛い。」","機械天使の翼が、わずかに下がった。"]
 ][turn%3];
 bond=Math.min(100,bond+14);say(lines,beginDefense);
}
function attackTap(){
 if(state!=="ATTACK"||attackEnded)return;
 const q=1-Math.abs(270-attackX)/200;
 let mult=32*attackBoost[active];if(critTurns>0)mult*=1.75;if(bossFx.coreOpen>0)mult*=1.5;
 const hit=Math.floor(current().pow*(.34+clamp(q,0,1)*.95)*(1+attackHits*.10)*mult);
 attackHits++;attackTotal+=hit;damageBoss(hit);attackDir*=-1;attackX=clamp(attackX+(Math.random()<.5?-28:28),70,470);
 toast(q>.9?`PERFECT ×${attackHits}`:`HIT ×${attackHits}`,.35);
 if(attackHits>=7)finishAttack();
}
function finishAttack(){
 if(attackEnded)return;attackEnded=true;
 const fin=Math.floor(attackTotal*(attackHits>=5?.35:.15));if(fin>0)damageBoss(fin);
 if(boss.hp>0)setTimeout(beginDefense,450);
}
function sixLink(){
 bond=0;say(["六人の想いが、一つの朝へ重なった。","六人連携奥義――『DAYBREAK』"],()=>{damageBoss(18280);if(boss.hp>0)beginDefense()})
}
function beginDefense(){
 if(boss.hp<=0)return;
 if(bond>=100)return sixLink();
 if(timeStopTurns>0){timeStopTurns--;toast(`敵ターン停止　残り${timeStopTurns}`,1);return setTimeout(nextTurn,700)}
 setState("DEFENSE");defenseTime=[0,7.4,8.4,9.4,10.5,11.5][boss.phase];
 patternClock=0;bullets=[];trails=[];heart.x=270;heart.y=515;heart.inv=.5;
 patternId=(turn*5+boss.phase*7)%30;spawnPattern(patternId);
}
function add(x,y,vx,vy,r,c,k,extra={}){bullets.push({x,y,vx,vy,r,c,k,...extra})}
function spawnPattern(id){
 const A=arena,cx=270,cy=510;bossFx.handL=bossFx.handR=bossFx.charge=0;bossFx.coreOpen=0;id%=30;
 if(id===0){bossFx.handL=1;bossFx.reach=1.2;for(let i=0;i<7;i++)add(A.x-45,A.y+35+i*52,255,0,22,"#dce9f6","hand",{warn:.55})}
 if(id===1){bossFx.handR=1;bossFx.reach=1.2;for(let i=0;i<7;i++)add(A.x+A.w+45,A.y+35+i*52,-255,0,22,"#dce9f6","hand",{warn:.55})}
 if(id===2){bossFx.handL=bossFx.handR=1;bossFx.reach=1.3;for(let i=0;i<6;i++){add(A.x-40,A.y+45+i*62,230,0,20,"#fff","hand",{warn:.8});add(A.x+A.w+40,A.y+45+i*62,-230,0,20,"#fff","hand",{warn:.8})}}
 if(id===3){for(let i=0;i<5;i++)add(A.x+55+i*90,A.y-100,0,320,32,"#b8c5d3","slam",{warn:.65})}
 if(id===4){bossFx.charge=1;bossFx.dash=1.2;add(A.x-120,cy,520,0,58,"#e9f5ff","body",{warn:.9})}
 if(id===5){bossFx.charge=-1;bossFx.dash=1.2;add(A.x+A.w+120,cy,-520,0,58,"#e9f5ff","body",{warn:.9})}
 if(id===6)for(let i=0;i<18;i++){const a=i*Math.PI*2/18;add(cx,cy,Math.cos(a)*210,Math.sin(a)*210,8,"#ffd657","ring")}
 if(id===7)for(let i=0;i<22;i++){const a=i*.55;add(cx,cy,Math.cos(a)*125,Math.sin(a)*125,7,i%2?"#fff":"#ff7190","spiral",{spin:i%2?.9:-.9})}
 if(id===8)for(let i=0;i<15;i++)add(rnd(A.x,A.x+A.w),A.y-30-rnd(0,180),rnd(-25,25),190+rnd(0,110),7,"#eef7ff","feather")
 if(id===9)for(let i=0;i<11;i++)add(i%2?A.x+A.w:A.x,A.y+24+(i%6)*70,i%2?-180:180,0,11,"#ff844f","homing")
 if(id===10)for(let i=0;i<7;i++)add(A.x+45+i*65,A.y-25,0,235,14,"#b6dcff","blade",{wave:i})
 if(id===11){bossFx.coreOpen=3;for(let i=0;i<12;i++)add(rnd(A.x,A.x+A.w),rnd(A.y,A.y+A.h),rnd(-55,55),rnd(-55,55),8,"#ff4f73","core")}
 if(id===12){add(cx,cy,0,0,35,"#14152a","gravity");for(let i=0;i<13;i++)add(rnd(A.x,A.x+A.w),rnd(A.y,A.y+A.h),rnd(-130,130),rnd(-130,130),6,"#fff","star")}
 if(id===13)for(let i=0;i<12;i++){const a=i*Math.PI*2/12;add(cx+Math.cos(a)*220,cy+Math.sin(a)*180,-Math.cos(a)*180,-Math.sin(a)*180,9,"#c578ff","orbit")}
 if(id===14)for(let i=0;i<20;i++)add(rnd(A.x,A.x+A.w),rnd(A.y,A.y+A.h),0,0,7,i%3?"#fff":"#55d8ff","fake",{fake:i%4===0})
 if(id===15)for(let i=0;i<9;i++)add(i%2?A.x+A.w:A.x,A.y+40+i*45,i%2?-260:260,Math.sin(i)*100,8,"#ff5f82","sweep")
 if(id===16)for(let i=0;i<8;i++)add(rnd(A.x,A.x+A.w),rnd(A.y,A.y+A.h),0,0,12,"#ffe05e","mine",{timer:rnd(.6,1.3)})
 if(id===17)for(let i=0;i<16;i++){const a=i*Math.PI*2/16;add(cx+Math.cos(a)*260,cy+Math.sin(a)*220,-Math.cos(a)*240,-Math.sin(a)*240,i%4===0?13:7,i%4===0?"#ff3d5d":"#fff","judgement")}
 if(id===18){bossFx.handL=1;for(let i=0;i<10;i++)add(A.x-40,A.y+30+i*39,210,Math.sin(i)*95,16,"#d8e5f1","grab")}
 if(id===19){bossFx.handR=1;for(let i=0;i<10;i++)add(A.x+A.w+40,A.y+30+i*39,-210,Math.sin(i)*95,16,"#d8e5f1","grab")}
 if(id===20)for(let i=0;i<6;i++)add(A.x+50+i*75,A.y-30,Math.sin(i)*80,250,20,"#ffcc5a","meteor")
 if(id===21)for(let i=0;i<24;i++){const a=i*Math.PI*2/24;add(cx,cy,Math.cos(a)*(140+(i%3)*35),Math.sin(a)*(140+(i%3)*35),6,i%3?"#fff":"#69d8ff","burst")}
 if(id===22){bossFx.charge=1;bossFx.dash=1.5;for(let i=0;i<4;i++)add(A.x-100-i*80,A.y+90+i*75,430,0,40,"#eef7ff","body",{warn:.65+i*.12})}
 if(id===23){bossFx.coreOpen=4;for(let i=0;i<18;i++)add(i%2?A.x+A.w:A.x,A.y+20+(i%9)*45,i%2?-230:230,0,7,i%3?"#fff":"#ff375d","final")}
 if(id===24)for(let i=0;i<10;i++)add(A.x+25+i*48,A.y+A.h+30,Math.sin(i)*70,-240,13,"#7bdcff","geyser")
 if(id===25)for(let i=0;i<8;i++)add(rnd(A.x,A.x+A.w),A.y-20,rnd(-80,80),210,18,"#f2f6ff","drill",{spin:rnd(-2,2)})
 if(id===26)for(let i=0;i<14;i++)add(cx,cy,rnd(-260,260),rnd(-260,260),7,"#ff77c8","split",{life:1})
 if(id===27)for(let i=0;i<12;i++)add(i%2?A.x+A.w:A.x,A.y+20+(i%6)*72,i%2?-210:210,0,10,"#ffd84e","zig",{phase:i})
 if(id===28){bossFx.handL=bossFx.handR=1;bossFx.reach=1.6;for(let i=0;i<16;i++)add(rnd(A.x,A.x+A.w),rnd(A.y,A.y+A.h),rnd(-120,120),rnd(-120,120),9,"#d9e4ef","knuckle")}
 if(id===29){bossFx.coreOpen=5;for(let i=0;i<30;i++){const a=i*Math.PI*2/30;add(cx,cy,Math.cos(a)*(170+(i%4)*25),Math.sin(a)*(170+(i%4)*25),i%5===0?12:6,i%5===0?"#ff3657":"#fff","finale")}}
}
function updateDefense(dt){
 patternClock+=dt;bossFx.coreOpen=Math.max(0,bossFx.coreOpen-dt);
 const slow=forecastTurns>0?.58:1,pending=[];
 if(patternClock>3&&bullets.length<75){patternClock=0;spawnPattern((patternId+1+Math.floor(Math.random()*5))%30)}
 for(const b of bullets){
  if(b.warn>0){b.warn-=dt;continue}
  if(b.k==="homing"){const dx=heart.x-b.x,dy=heart.y-b.y,l=Math.hypot(dx,dy)||1;b.vx+=dx/l*85*dt;b.vy+=dy/l*85*dt}
  if(b.k==="spiral"){const a=b.spin*dt,ox=b.vx,oy=b.vy;b.vx=ox*Math.cos(a)-oy*Math.sin(a);b.vy=ox*Math.sin(a)+oy*Math.cos(a)}
  if(b.k==="blade")b.vx=Math.sin(time*5+b.wave)*90;
