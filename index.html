<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#070b12">
<title>PYRAMID BREAK ZERO v7</title>
<style>
:root{--ui:#e8f1ff;--line:#2a6fb8;--dark:#070b12;--panel:#0e1725;--accent:#ffd24a}
*{box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:system-ui,-apple-system,sans-serif;color:white}
body{display:grid;place-items:center}
#wrap{position:relative;width:100vw;height:100dvh;background:#000;overflow:hidden}
canvas{width:100%;height:100%;display:block;image-rendering:pixelated;touch-action:none}
#hud{position:absolute;inset:0;pointer-events:none}
#topbar{position:absolute;top:max(8px,env(safe-area-inset-top));left:10px;right:10px;display:flex;gap:8px;align-items:flex-start}
.panel{background:rgba(4,8,15,.86);border:2px solid #2a6fb8;border-radius:10px;box-shadow:0 0 0 2px #000 inset;padding:8px}
#playerPanel{width:min(56vw,420px)}
#bossPanel{margin-left:auto;width:min(38vw,310px);display:none}
.title{font-weight:900;letter-spacing:.08em;font-size:12px}
.nameRow{display:flex;justify-content:space-between;gap:10px;font-size:12px;margin-bottom:5px}
.bar{height:12px;background:#10131a;border:2px solid #dbe8ff;border-radius:3px;overflow:hidden}
.fill{height:100%;width:100%;transition:width .08s linear}
#hpFill{background:linear-gradient(#74ff55,#19a728)}
#spFill{background:linear-gradient(#59bfff,#1b5de8)}
#bossFill{background:linear-gradient(#ff7063,#bc1010)}
#objective{position:absolute;top:92px;left:50%;transform:translateX(-50%);min-width:240px;text-align:center;font-size:12px;background:rgba(0,0,0,.65);padding:6px 12px;border:1px solid #fff4;border-radius:20px}
#message{position:absolute;left:50%;top:36%;transform:translate(-50%,-50%);font-weight:900;font-size:clamp(18px,5vw,42px);text-align:center;text-shadow:0 4px 0 #000,0 0 10px #000;opacity:0;transition:opacity .15s;white-space:pre-line}
#charStrip{position:absolute;left:50%;bottom:calc(112px + env(safe-area-inset-bottom));transform:translateX(-50%);display:flex;gap:5px;pointer-events:auto}
.charBtn{width:54px;height:54px;border-radius:8px;border:2px solid #6a7485;background:#111827;color:white;font-size:9px;font-weight:800;padding:2px;box-shadow:0 3px 0 #000;touch-action:manipulation}
.charBtn.active{border-color:#ffd24a;transform:translateY(-3px);box-shadow:0 0 12px #ffd24a88}
.charBtn.locked{filter:grayscale(1);opacity:.4}
.icon{display:block;font-size:20px}
#controls{position:absolute;left:0;right:0;bottom:max(8px,env(safe-area-inset-bottom));height:98px;pointer-events:none}
.ctrl{position:absolute;pointer-events:auto;touch-action:none;border:none;color:#fff;font-weight:900;background:rgba(15,25,40,.8);border:3px solid #8ebde8;box-shadow:0 4px 0 #000;border-radius:50%;width:72px;height:72px;font-size:28px}
.ctrl:active,.ctrl.down{transform:translateY(3px);box-shadow:0 1px 0 #000;background:rgba(45,90,145,.92)}
#left{left:18px;bottom:10px} #right{left:94px;bottom:10px}
#attack{right:98px;bottom:6px;border-color:#ffbf42;background:rgba(92,55,8,.85)}
#jump{right:18px;bottom:18px;border-color:#60a8ff}
#skill{right:62px;bottom:78px;width:58px;height:58px;border-color:#c26cff;background:rgba(67,18,95,.88);font-size:20px}
#pause{position:absolute;right:12px;top:max(82px,calc(env(safe-area-inset-top) + 70px));pointer-events:auto;background:#0b1422cc;color:#fff;border:2px solid #8ebde8;border-radius:8px;padding:7px 11px;font-weight:900}
#startScreen,#pauseScreen,#clearScreen{position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,#1f3557,#05070c 65%);display:grid;place-items:center;z-index:10;padding:24px}
.card{width:min(720px,92vw);background:#07111eee;border:3px solid #2a6fb8;border-radius:14px;padding:22px;text-align:center;box-shadow:0 0 30px #000}
.logo{font-size:clamp(30px,7vw,68px);font-weight:1000;line-height:.9;letter-spacing:.02em;text-shadow:4px 5px 0 #173d66}
.logo b{color:#ff3946}
.subtitle{margin:14px 0 20px;color:#ffd24a;font-weight:800;letter-spacing:.18em}
.mainBtn{font-size:20px;font-weight:900;padding:14px 28px;border-radius:8px;border:2px solid #fff;background:#1b6fbe;color:#fff;box-shadow:0 5px 0 #08294a}
.small{font-size:12px;color:#c8d5e5;line-height:1.7}
.hidden{display:none!important}
#rotate{display:none;position:absolute;inset:0;z-index:30;background:#000;color:#fff;place-items:center;text-align:center;padding:30px;font-weight:900}
@media (orientation:portrait) and (max-width:800px){#rotate{display:grid}}
</style>
</head>
<body>
<div id="wrap">
<canvas id="game" width="960" height="540"></canvas>
<div id="hud">
  <div id="topbar">
    <div class="panel" id="playerPanel">
      <div class="nameRow"><span id="playerName">ISAJI</span><span id="score">000000</span></div>
      <div class="bar"><div class="fill" id="hpFill"></div></div>
      <div style="height:4px"></div>
      <div class="bar" style="height:8px"><div class="fill" id="spFill"></div></div>
    </div>
    <div class="panel" id="bossPanel">
      <div class="nameRow"><span>BOSS MAPPY</span><span id="bossPhase">PHASE 1</span></div>
      <div class="bar"><div class="fill" id="bossFill"></div></div>
    </div>
  </div>
  <div id="objective">遺跡の奥へ進め</div>
  <div id="message"></div>
  <button id="pause">Ⅱ</button>
  <div id="charStrip"></div>
  <div id="controls">
    <button class="ctrl" id="left">◀</button>
    <button class="ctrl" id="right">▶</button>
    <button class="ctrl" id="attack">拳</button>
    <button class="ctrl" id="jump">↑</button>
    <button class="ctrl" id="skill">技</button>
  </div>
</div>
<div id="startScreen">
 <div class="card">
  <div class="logo">PYRAMID<br>BREAK <b>ZERO</b></div>
  <div class="subtitle">v7 ULTIMATE</div>
  <button class="mainBtn" id="startBtn">GAME START</button>
  <p class="small">横移動・ジャンプ・攻撃・必殺技・キャラ切替<br>音は最初のタップ後に再生されます</p>
 </div>
</div>
<div id="pauseScreen" class="hidden"><div class="card"><h1>PAUSE</h1><button class="mainBtn" id="resumeBtn">つづける</button></div></div>
<div id="clearScreen" class="hidden"><div class="card"><h1>STAGE CLEAR!</h1><p id="result"></p><button class="mainBtn" id="againBtn">もう一度</button></div></div>
<div id="rotate">iPhoneを横向きにしてください</div>
</div>
<script src="game.js"></script>
</body></html>
