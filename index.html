<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#060914">
<title>PYRAMID BREAK ZERO v6</title>
<style>
:root{color-scheme:dark}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#060914;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;touch-action:none}#game{display:block;width:100vw;height:100vh;image-rendering:pixelated;background:#060914}#rotate{display:none;position:fixed;inset:0;background:#060914;color:#fff;z-index:20;align-items:center;justify-content:center;text-align:center;padding:28px;font-weight:800}#loading{position:fixed;inset:0;display:grid;place-items:center;background:#060914;color:#fff;z-index:10;letter-spacing:.08em}.small{font-size:12px;opacity:.65;margin-top:10px}@media(orientation:portrait){#rotate{display:flex}}
</style>
</head>
<body>
<canvas id="game" width="960" height="540" aria-label="PYRAMID BREAK ZERO game"></canvas>
<div id="loading">PYRAMID BREAK ZERO<div class="small">TAP TO START</div></div>

</html>
