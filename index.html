<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#03050a">
<title>PYRAMID BREAK ZERO - DAYBREAK v2</title>
<style>
*{box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
body{display:grid;place-items:center}
#wrap{position:relative;width:100vw;height:100dvh;background:#000}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;touch-action:none}
#start,#end{position:absolute;inset:0;z-index:20;background:radial-gradient(circle at 50% 35%,#273957,#070912 63%,#010103);display:grid;place-items:center;padding:22px}
.card{width:min(92vw,780px);padding:26px;border:4px solid #fff;background:#020306f2;text-align:center;box-shadow:0 0 45px #000}
.logo{font-size:clamp(34px,7vw,70px);font-weight:1000;line-height:.86;text-shadow:5px 5px 0 #203b67}.logo b{color:#ffd75a}
.card button{margin-top:18px;padding:14px 28px;border:3px solid #fff;background:#05070d;color:#fff;font:900 20px monospace}
.small{font-size:12px;line-height:1.7;color:#c7d1dd}.hidden{display:none!important}
#rotate{display:none;position:absolute;inset:0;z-index:50;background:#000;place-items:center;text-align:center;padding:28px;font-weight:900}
@media(orientation:landscape) and (max-height:850px){#rotate{display:grid}}
</style>
</head>
<body>
<div id="wrap">
<canvas id="game" width="540" height="960"></canvas>
<div id="start"><div class="card">
<div class="logo">PYRAMID BREAK ZERO<br><b>DAYBREAK XII</b></div>
<p>縦画面・敵ターン／必殺技 完全修正版</p>
<button id="go">物語を始める</button>
<p class="small">スマホ縦画面専用。メニューは直接タップ、弾幕中はハートを指でドラッグ。<br>ハートには強い縁取り・光・残像を付け、弾幕の中でも見失いにくくしています。</p>
</div></div>
<div id="end" class="hidden"><div class="card"><div class="logo" id="endTitle">DAYBREAK</div><p id="endText"></p><button id="again">もう一度</button></div></div>
<div id="rotate">iPhoneを縦向きにしてください</div>
</div>
<script>
(()=>{"use strict";
const cv=document.getElementById("game"),g=cv.getContext("2d");g.imageSmoothingEnabled=false;
const W=540,H=960,arena={x:40,y:300,w:460,h:430};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),rnd=(a,b)=>a+Math.random()*(b-a);
let scene="opening",sub="dialog",last=0,sel=0,active=0,turn=0,bond=0,score=0,shake=0,flash=0;
let dialogue=[],di=0,after=null,msg="",msgT=0,bullets=[],particles=[],trails=[];
let attackX=70,attackDir=1,defT=0,patternId=0,patternClock=0,freeze=0,foresight=false,guard=false,berserk=0;
let deaths=0,sacrifices=0,talkCount=0,perfects=0;
let skillFx={t:0,type:"",name:"",color:"#fff"};let damagePop=[];
let attackTime=0,attackHits=0,attackTotal=0,attackEnded=false,attackLastQuality=0;
let skillGame=null;let memoryGame={timer:0,phase:0,progress:0,choice:-1,targets:[],held:false,
angle:0,hits:0,need:3,downX:0,downY:0,charge:0,correct:1,reveal:0,result:false,quote:""};
let platform={x:70,y:640,vx:0,vy:0,ground:690,camera:0,goal:1040,dead:false,coins:0,falls:0,checkpoint:70,won:false,tutorialPage:0,ready:false,moveHold:0,moveDir:0,inv:0};
let beam={timer:0,aimX:270,aimY:500,shots:0,cores:[],bossX:270,bossY:450,drag:false,tutorialPage:0,ready:false,selected:-1};
let seal={timer:0,index:0,nodes:[]};
let gimmickLock=false;
let skillUsed=[false,false,false,false,false,false];
let permanentDead=[false,false,false,false,false,false];
let timeStopTurns=0,barrierTurns=0,critTurns=0,forecastTurns=0,oniTurns=0;
let attackBoost=[1,1,1,1,1,1],stunTurns=[0,0,0,0,0,0];
let lastPhase=1,bossMove={slam:0,charge:0,handL:0,handR:0,coreOpen:0};
let visualTime=0,transitionFx=0,transitionLabel="",bossAura=[],screenLines=[];
for(let i=0;i<38;i++)bossAura.push({a:Math.random()*Math.PI*2,r:55+Math.random()*150,s:.25+Math.random()*.7,z:1+Math.random()*3});
for(let i=0;i<18;i++)screenLines.push({y:Math.random()*960,v:8+Math.random()*20,a:.02+Math.random()*.05});
let bossFx={hit:0,charge:0,roar:0,transform:0,blink:0,tilt:0,wing:0,hover:0,core:0,attack:0};
let bgStars=[];for(let i=0;i<70;i++)bgStars.push({x:Math.random()*540,y:Math.random()*960,s:Math.random()*2+1,v:Math.random()*18+8,a:Math.random()});
let audio=null,musicTimer=null,musicMood="quiet",noteStep=0;
const items={herb:1,dew:0,leaf:0,ether:0};
const party=[
{name:"トシユキ",max:120,hp:120,mp:75,mm:75,c:"#6d5eb0",skill:"ザ・ワールド",quote:"時間は止められる。でも、想いまでは止められない。",pow:20,spd:1},
{name:"カズアキ",max:190,hp:190,mp:48,mm:48,c:"#754a3e",skill:"ワールド・イズ・マイン",quote:"全部背負う。それが俺の役目だ。",pow:36,spd:.84},
{name:"マッピー",max:115,hp:115,mp:90,mm:90,c:"#cda75e",skill:"ピラミッド・ハート",quote:"勝つんじゃない。みんなで帰るんだ。",pow:16,spd:1},
{name:"ケイタ",max:125,hp:125,mp:75,mm:75,c:"#ed912f",skill:"鳳翼天翔",quote:"燃え尽きても、朝はまた来る。",pow:26,spd:1.2},
{name:"イサジ",max:175,hp:175,mp:44,mm:44,c:"#ebc34e",skill:"領域展開・鬼",quote:"怖くても進む。それが俺たちだ。",pow:33,spd:.92},
{name:"リョウゴ",max:130,hp:130,mp:80,mm:80,c:"#3f8bc7",skill:"虫の知らせ",quote:"未来は決まってない。だから見に行く。",pow:23,spd:1.32}
];
const boss={name:"機械天使 アルカ・セラフ 完全体",max:100000,hp:100000,phase:1,armor:280,resolve:120,mercy:0,weak:"none"};
const heart={x:480,y:380,r:9,inv:0,mode:"red",vy:0,drag:false,offX:0,offY:0};
const actions=["たたかう","わざ","どうぐ","まもる","はなす","こうたい"];
const menuRects=[];
function ac(){if(!audio)audio=new(window.AudioContext||window.webkitAudioContext)}
function beep(f=220,d=.08,t="sine",v=.025){if(!audio)return;const o=audio.createOscillator(),a=audio.createGain();o.type=t;o.frequency.value=f;a.gain.value=v;o.connect(a);a.connect(audio.destination);o.start();a.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+d);o.stop(audio.currentTime+d)}
function music(){if(musicTimer)return;musicTimer=setInterval(()=>{const seq=musicMood==="quiet"?[220,277,330,392,330,277,247,220]:musicMood==="hope"?[196,247,294,392,440,392,330,294,220,277,330,440,494,440,392,330]:musicMood==="despair"?[82,98,110,123,110,98,73,82]:[110,147,165,196,220,247,220,196,123,165,185,247,277,247,220,185];const f=seq[noteStep++%seq.length];beep(f,.18,musicMood==="quiet"?"sine":"triangle",musicMood==="quiet"?.018:.016);if(noteStep%8===0)beep(f/2,.38,"sine",.012)},170)}
function say(a,f=null){dialogue=Array.isArray(a)?a:[a];di=0;sub="dialog";after=f}
function nextDialog(){di++;if(di>=dialogue.length){sub="choose";if(after){const f=after;after=null;f()}}}
function toast(s,t=1.1){msg=s;msgT=t}
function part(x,y,c,n=12,p=1){for(let i=0;i<n;i++)particles.push({x,y,vx:rnd(-190,190)*p,vy:rnd(-240,90)*p,l:rnd(.3,.8),c,s:rnd(2,7)})}
function current(){
if(party[active].hp<=0||permanentDead[active]){
 const i=party.findIndex((p,j)=>p.hp>0&&!permanentDead[j]);
 active=i<0?0:i;
}
return party[active]
}

const actionWords={
 attack:[
  "トシユキ「一撃で終わらせようとするな。何度でも、届くまで打て。」",
  "カズアキ「迷うな。中央に重なった瞬間だけ見ろ。」",
  "マッピー「数字じゃない。今の一撃に、帰る理由を込めるんだ。」"
 ],
 enemy:[
  "機械天使「防衛機構を展開。あなたたちの意志を測定します。」",
  "リョウゴ「来る。軌道は見える。でも、未来は自分で避けろ。」",
  "イサジ「ハートを見失うな。生き残ることも攻撃だ。」"
 ],
 item:[
  "マッピー「道具は弱さじゃない。帰るための準備だ。」",
  "ケイタ「回復できる時に回復しよう。倒れてからじゃ遅い。」"
 ],
 switch:[
  "リョウゴ「役目を変える。逃げるんじゃない、つなぐんだ。」",
  "トシユキ「次の一秒を、次の仲間へ渡す。」"
 ],
 guard:[
  "カズアキ「傷は俺が受ける。お前たちは前を見ろ。」",
  "機械天使「なぜ、他者の痛みを選ぶのですか？」"
 ],
 skill:[
  "機械天使「特殊術式を検知。そこにある感情を解析します。」",
  "マッピー「必殺技は強い技じゃない。何を選ぶかを見せる技だ。」"
 ]
};
function pickWords(key){const a=actionWords[key]||["六人は息を合わせた。"];return a[turn%a.length]}
function startEnemyTurn(){
 const lines=[pickWords("enemy")];
 if(boss.phase===2)lines.push("機械天使「第二防衛層、解放。あなたたちの記憶を試します。」");
 if(boss.phase===3)lines.push("機械天使「最終防衛層。これ以上近づけば、私は私でなくなる。」");
 say(lines,beginDefenseNow);
}
function beginDefenseNow(){
 if(boss.hp<=0||gimmickLock)return;
 transition("ENEMY PHASE",boss.phase===3?"#ff496c":"#65d6ff");bossFx.charge=.9;bossFx.attack=1.1;scene="defense";sub="play";
 defT=boss.phase===5?11.5:boss.phase===4?10.5:boss.phase===3?9.4:boss.phase===2?8.4:7.4;
 patternClock=0;bullets=[];trails=[];heart.x=270;heart.y=515;heart.inv=.6;heart.mode="red";heart.vy=0;
 patternId=(turn*5+boss.phase*7)%24;spawnPattern(patternId);
}

function transition(label,color="#7fd8ff"){
 transitionFx=1;transitionLabel=label;flash=.12;shake=Math.max(shake,5);
 part(270,430,color,22,1.1);
}
function glowRect(x,y,w,h,c,blur=18){
 g.save();g.shadowColor=c;g.shadowBlur=blur;g.fillStyle=c;g.fillRect(x,y,w,h);g.restore();
}
function panel(x,y,w,h,edge="#8aa4c8",fill="#070b14e8"){
 g.save();g.fillStyle=fill;g.strokeStyle=edge;g.lineWidth=3;
 g.beginPath();g.roundRect(x,y,w,h,12);g.fill();g.stroke();
 g.globalAlpha=.25;g.strokeStyle="#fff";g.lineWidth=1;
 g.beginPath();g.moveTo(x+12,y+8);g.lineTo(x+w-12,y+8);g.stroke();g.restore();
}
function damageBoss(n){n=Math.max(1,Math.floor(n-boss.armor));boss.hp-=n;score+=n*10;damagePop.push({x:270,y:220,v:-105,l:1.15,n:Math.floor(n),crit:n>=120});shake=12;flash=.08;part(270,220,"#fff",24,1.4);beep(80,.16,"square",.06);if(boss.hp<=0){boss.hp=0;combatEnd()}}
function chooseAction(index){
sel=index;
if(index===0){
 transition("PLAYER ATTACK","#ffd84e");
 scene="attack";attackX=70;attackDir=1;attackTime=3.6;attackHits=0;attackTotal=0;attackEnded=false;sub="play";
}
if(index===1){transition("SPECIAL","#d8b8ff");scene="skill";sub="choose"}
if(index===2){scene="item";sub="choose"}
if(index===3){guard=true;bond=Math.min(100,bond+13);toast(current().name+"は身を固めた",.8);beginDefense()}
if(index===4)talk();
if(index===5){scene="switch";sub="choose"}
}
function useSkill(){
const p=current(),i=active;
if(skillUsed[i]){scene="menu";sub="choose";toast("この必殺技はもう使えない",1.0);return}
skillUsed[i]=true;skillFx={t:2.1,type:["clock","slash","pyramid","phoenix","oni","future"][i],name:p.skill,color:p.c};
scene="skillResolve";sub="play";flash=.18;shake=14;transition(p.skill,p.c);

if(i===0){
 p.mp=0;timeStopTurns=2;damageBoss(6500);
 party.forEach((a,j)=>{if(!permanentDead[j])a.hp=Math.min(a.max,a.hp+35)});
 damagePop.push({x:270,y:240,v:-75,l:1.5,n:"TIME STOP 6500",crit:true});
 return say(["時間が止まった。","トシユキ「敵の二回の攻撃を消す。だが、もう二度と止められない。」"],nextTurn);
}
if(i===1){
 p.hp=1;critTurns=3;boss.armor=0;stunTurns[i]=2;damageBoss(11000);
 damagePop.push({x:270,y:240,v:-75,l:1.5,n:"WORLD IS MINE 11000",crit:true});
 return say(["カズアキは世界の境界を斬った。","三ターン、全員の攻撃が防御を無視する。カズアキは二ターン動けない。"],beginDefense);
}
if(i===2){
 barrierTurns=3;p.mp=0;damageBoss(3500);
 party.forEach((a,j)=>{if(!permanentDead[j])a.hp=Math.min(a.max,a.hp+25)});
 return say(["巨大なピラミッドが六人を覆った。","三回の敵攻撃を大幅に軽減する。"],beginDefense);
}
if(i===3){
 damageBoss(5000);
 party.forEach((a,j)=>{if(j!==i&&!permanentDead[j])a.hp=a.max});
 p.hp=0;permanentDead[i]=true;sacrifices++;
 damagePop.push({x:270,y:240,v:-75,l:1.5,n:"PHOENIX 5000",crit:true});
 return say(["仲間全員の傷が消えた。","ケイタ「これで、みんな帰れる。」","鳳凰が消えたあと、ケイタの場所だけが空いていた。"],nextTurn);
}
if(i===4){
 p.hp=1;oniTurns=4;attackBoost[i]=6;damageBoss(7500);
 return say(["イサジは自分の命を一滴だけ残した。","四ターンだけ攻撃力が六倍になる。鬼化中は回復できない。"],beginDefense);
}
if(i===5){
 forecastTurns=4;p.mp=0;damageBoss(4200);
 return say(["次の四回の攻撃が青い予告線として見える。","弾幕速度も下がる。未来視は一度しか使えない。"],beginDefense);
}
}
function useItem(i){
if(i!==0){toast("使える道具は共有のやくそう1個だけ",1.0);return}
if(items.herb<=0){toast("やくそうはもうない",.9);return}
const p=current();
if(active===4&&oniTurns>0){toast("鬼化中のイサジには回復が届かない",1.1);return}
items.herb--;p.hp=Math.min(p.max,p.hp+80);bond=Math.min(100,bond+8);
toast(`${p.name}のHPが80回復　やくそう残り0`,1.2);
beginDefense();
}
function talk(){
talkCount++;const q=[
["マッピー「あなたは、誰かに止めてほしいんじゃないのか？」","機械天使「……命令に、願いは必要ない。」"],
["リョウゴ「未来には、君が泣いている姿が見える。」","機械天使「私は、泣く機能を持たない。」"],
["ケイタ「機能じゃなくても、痛いものは痛い。」","翼の一枚が、わずかに震えた。"],
["トシユキ「帰りたい気持ちを選べ。」","機械天使「帰る場所など、私にはない。」"],
["イサジ「なら作ればいい。俺たちもそうしてきた。」","機械天使の瞳から、光が一滴こぼれた。"],
["カズアキ「帰る場所は、誰かと一緒に作るものだ。」","機械天使「……私にも、できますか？」"],["マッピー「君が壊したものより、これから守れるものを数えよう。」","機械天使「私は……守る側になれますか？」"],["トシユキ「過去は変えられない。でも、次の一秒は選べる。」","機械天使「次の一秒を……私にください。」"],
["機械天使「私は、壊した数しか覚えていない。」","マッピー「じゃあ今日から、守れた数を一緒に数えよう。」"],
["機械天使「朝は、私のようなものにも来ますか？」","リョウゴ「朝は誰かを選ばない。だから俺たちも君を選ぶ。」"]
];const i=Math.min(q.length-1,Math.floor(boss.mercy/20));boss.mercy+=20;boss.resolve=Math.max(0,boss.resolve-20);bond=Math.min(100,bond+16);say(q[i],()=>{if(boss.resolve<=0&&bond>=75)peaceEnd();else beginDefense()})
}
function attackTap(){
if(attackEnded||scene!=="attack")return;
const q=1-Math.abs(270-attackX)/200;
const quality=clamp(q,0,1);
attackLastQuality=quality;
let mult=32*attackBoost[active];
if(critTurns>0)mult*=1.75;
if(bossMove.coreOpen>0)mult*=1.5;
const hit=Math.floor(current().pow*(.34+quality*.95)*(1+attackHits*.10)*mult);
attackHits++;attackTotal+=hit;
damageBoss(hit);
if(quality>.9){perfects++;bond=Math.min(100,bond+3);toast("PERFECT CHAIN ×"+attackHits,.45)}
else if(quality>.58)toast("GOOD ×"+attackHits,.4);
else toast("RUSH ×"+attackHits,.35);
attackDir*=-1;
attackX=clamp(attackX+(Math.random()<.5?-35:35),70,470);
if(attackHits>=7)finishComboAttack();
}
function finishComboAttack(){
if(attackEnded)return;
attackEnded=true;
const finisher=Math.floor(attackTotal*(attackHits>=5?.35:.15));
if(finisher>0)damageBoss(finisher);
damagePop.push({x:270,y:260,v:-80,l:1.25,n:"COMBO "+attackHits,crit:attackHits>=6});
if(boss.hp>0)setTimeout(beginDefense,520);
}
function sixLink(){
bond=0;musicMood="hope";flash=.35;shake=20;
say(["六人の想いが、一つの朝へ重なった。","六人連携奥義――『DAYBREAK』"],()=>{
 damageBoss(18000);
 damagePop.push({x:270,y:230,v:-80,l:1.6,n:"DAYBREAK 18000",crit:true});
 if(boss.hp>0)beginDefense();
})
}
function beginDefense(){
if(boss.hp<=0)return;
if(bond>=100)return sixLink();
if(timeStopTurns>0){
 timeStopTurns--;transition("TIME STOP","#d8c8ff");
 toast(`敵ターン消滅　残り${timeStopTurns}`,1.0);
 return setTimeout(nextTurn,700);
}
beginDefenseNow();
}
function beginPlatform(){
transition("MEMORY WORLD","#ffd84e");gimmickLock=true;scene="platformIntro";sub="play";
platform={x:70,y:640,vx:0,vy:0,ground:690,camera:0,goal:1040,dead:false,coins:0,falls:0,checkpoint:70,won:false,tutorialPage:0,ready:false,moveHold:0,moveDir:0,inv:0};
visualTime=0;transitionFx=0;transitionLabel="";
}
function beginBeam(){
transition("CORE BREAK","#ff5974");gimmickLock=true;scene="beamTutorial";sub="play";
beam={timer:14.0,aimX:270,aimY:500,shots:0,bossX:270,bossY:430,drag:false,tutorialPage:0,ready:false,selected:-1,cores:[
{x:160,y:420,hp:2},{x:380,y:470,hp:2},{x:270,y:350,hp:3}]};
}
function beginSeal(){
transition("SEAL PROTOCOL","#7fd8ff");gimmickLock=true;scene="sealIntro";sub="play";
seal={timer:8.5,index:0,nodes:[]};
for(let i=0;i<7;i++)seal.nodes.push({x:rnd(80,460),y:rnd(340,690),r:25,n:i+1,hit:false});
toast("光る番号を順番に封印せよ",1.4);
}
function endGimmick(success){
if(!gimmickLock)return;
gimmickLock=false;
if(success){
 bond=Math.min(100,bond+16);damageBoss(70+boss.phase*25);
 if(boss.hp<=0||scene==="end")return;
 scene="gimmickResult";sub="choose";
say(["ギミックを突破した。","機械天使「あなたたちは、試練の中でも互いの声を聞いている。」"],nextTurn);
}else{
 hurt(24+boss.phase*6);
 if(boss.hp<=0||scene==="end")return;
 scene="gimmickResult";sub="choose";
say(["試練を突破できなかった。","マッピー「失敗したって、次の手は残ってる。」"],nextTurn);
}
}
function spawnPattern(id){
const A=arena,cx=270,cy=510;
bossMove.slam=bossMove.charge=bossMove.handL=bossMove.handR=0;
id=id%24;

   next.hit=true;memoryGame.hits++;beep(330+memoryGame.hits*110,.08,"sine",.04);
   if(memoryGame.hits>=3)finishSkill(true)
  }else{memoryGame.timer-=.8;shake=5}
 }
 if(active===3){
  const e=memoryGame.targets.find(e=>!e.hit&&Math.hypot(p.x-e.x,p.y-(e.y-Math.sin(visualTime*2+e.x)*18))<e.r+25);
  if(e){e.hit=true;memoryGame.hits++;beep(400+memoryGame.hits*60,.06,"sine",.035);part(e.x,e.y,"#ff9f31",10,1);if(memoryGame.hits>=5)finishSkill(true)}
 }
 if(active===4&&Math.hypot(p.x-270,p.y-520)<145){memoryGame.held=true;beep(90,.1,"sawtooth",.025)}
 if(active===5&&memoryGame.reveal<=0){
  const lane=Math.max(0,Math.min(2,Math.floor((p.x-22)/165)));
  finishSkill(lane===memoryGame.correct);
 }
 return;
}
if(scene==="platformTutorial"){
platform.tutorialPage++;
if(platform.tutorialPage>=3){platform.ready=true;scene="platform";sub="play";toast("旗まで行こう。落ちても戻れる。",1.2)}
return}
if(scene==="platform"){
if(p.y>742&&p.x>350){
 if(Math.abs(platform.vy)<35||platform.y>620){platform.vy=-430;beep(420,.06,"square",.025)}
}else if(p.y>742&&p.x<205){
 platform.moveDir=p.x<122?-1:1;
 platform.moveHold=.48; /* タップだけでも約0.5秒進む */
 beep(platform.moveDir>0?240:190,.04,"square",.018);
}
return}
if(scene==="beam"){
/* コアを直接タップして選択 */
let ci=beam.cores.findIndex(c=>c.hp>0&&Math.hypot(p.x-c.x,p.y-c.y)<42);
if(ci>=0){
 beam.selected=ci;beam.aimX=beam.cores[ci].x;beam.aimY=beam.cores[ci].y;
 toast("照準セット。次にFIREをタップ",.8);beep(360,.07,"sine",.035);return;
}
/* FIREボタン */
if(p.y>=770&&p.y<=870&&p.x>=115&&p.x<=425){
 if(beam.selected<0){toast("先に赤いコアをタップしてください",1.0);beep(100,.1,"square",.04);return}
 const c=beam.cores[beam.selected];
 if(!c||c.hp<=0){beam.selected=-1;toast("次の赤いコアを選んでください",.9);return}
 beam.shots++;c.hp--;flash=.08;shake=8;particle(c.x,c.y,"#ff4565",16);beep(560,.08,"square",.05);
 if(c.hp<=0){
  toast("CORE BREAK!",.8);beam.selected=-1;
  if(beam.cores.every(x=>x.hp<=0)){
   return say(["ケイタ「全部壊した！」","機械天使「追撃機構、停止……あなたたちは、私を壊すより止めようとした。」"],()=>endGimmick(true))
  }
 }else toast(`命中！ あと${c.hp}発`,.65);
 return;
}
toast("赤いコアをタップしてください",.8);
return}
if(scene==="seal"){
const n=seal.nodes.find(n=>!n.hit&&Math.hypot(p.x-n.x,p.y-n.y)<n.r+14);
if(n){if(n.n===seal.index+1){n.hit=true;seal.index++;beep(260+seal.index*60,.08,"sine",.04);if(seal.index>=seal.nodes.length)endGimmick(true)}else{seal.timer-=1.2;shake=8}}
return}
if(scene==="defense"){heart.drag=true;heart.offX=heart.x-p.x;heart.offY=heart.y-p.y;heart.x=clamp(p.x+heart.offX,arena.x+12,arena.x+arena.w-12);heart.y=clamp(p.y+heart.offY,arena.y+12,arena.y+arena.h-12);return}
if(scene==="attack"){attackTap();return}
for(const m of menuRects)if(p.x>=m.x&&p.x<=m.x+m.w&&p.y>=m.y&&p.y<=m.y+m.h){if(m.type==="action")chooseAction(m.i);if(m.type==="skill")useSkill();if(m.type==="item")useItem(m.i);if(m.type==="switch"){if(party[m.i].hp>0){active=m.i;scene="menu";sub="choose";toast(party[m.i].name+"に交代",.7)}}return}
});
cv.addEventListener("pointermove",e=>{
const p=canvasPos(e);
if(scene==="beam"&&beam.drag){beam.aimX=clamp(p.x,arena.x,arena.x+arena.w);beam.aimY=clamp(p.y,arena.y,arena.y+arena.h);return}
if(!heart.drag||scene!=="defense")return;
e.preventDefault();
heart.x=clamp(p.x+heart.offX,arena.x+12,arena.x+arena.w-12);
heart.y=clamp(p.y+heart.offY,arena.y+12,arena.y+arena.h-12)
});
["pointerup","pointercancel","pointerout"].forEach(n=>cv.addEventListener(n,e=>{
 heart.drag=false;beam.drag=false;
 if(scene==="skillstory"&&active===1&&memoryGame.held){
  const p=e.clientX!==undefined?canvasPos(e):{x:memoryGame.downX,y:memoryGame.downY};
  if(p.x-memoryGame.downX>120&&Math.abs(p.y-memoryGame.downY)<150){
   memoryGame.hits++;beep(180+memoryGame.hits*90,.08,"sawtooth",.05);shake=8;flash=.06;
   if(memoryGame.hits>=3)finishSkill(true)
  }else memoryGame.timer-=.5;
  memoryGame.held=false;
 }
 if(scene==="skillstory"&&active===4)memoryGame.held=false;
}));
function loop(t){const dt=Math.min(.033,(t-last)/1000||0);last=t;if(scene!=="end")update(dt);draw();requestAnimationFrame(loop)}
document.getElementById("go").onclick=()=>{
try{
 ac();music();
 document.getElementById("start").classList.add("hidden");
 reset();
}catch(err){
 console.error(err);
 const card=document.querySelector("#start .card");
 if(card){
  const old=document.getElementById("bootError");
  if(old)old.remove();
  const p=document.createElement("p");
  p.id="bootError";
  p.style.color="#ff6b7d";
  p.style.fontSize="13px";
  p.textContent="起動エラーが発生しました。ページを再読み込みしてください。";
  card.appendChild(p);
 }
}
};
document.getElementById("again").onclick=()=>{document.getElementById("end").classList.add("hidden");reset()};
window.addEventListener("error",e=>console.error("DAYBREAK XI runtime:",e.error||e.message));
reset();requestAnimationFrame(loop);
})();</script>
</div>
</body></html>
