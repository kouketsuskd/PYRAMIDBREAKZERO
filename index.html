<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>ANGEL CORE</title><style>*{box-sizing:border-box;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050505;color:#fff;font-family:monospace}canvas{width:100%;height:100%;display:block;image-rendering:pixelated;touch-action:none}.b{position:fixed;border:3px solid #fff;background:#111c;color:#fff;font:bold 18px monospace;border-radius:9px;width:62px;height:62px;z-index:3}.b:active{transform:translateY(3px)}#u{left:80px;bottom:106px}#d{left:80px;bottom:24px}#l{left:18px;bottom:65px}#r{left:142px;bottom:65px}#ok{right:22px;bottom:62px;width:78px;height:78px;border-radius:50%;color:#ffd84a;border-color:#ffd84a}#bk{right:112px;bottom:25px;border-radius:50%;color:#ff6570;border-color:#ff6570}.ov{position:fixed;inset:0;background:radial-gradient(circle at 50% 35%,#263247,#020204 70%);display:grid;place-items:center;z-index:10}.card{border:4px solid #fff;background:#050505;padding:26px;text-align:center;width:min(90vw,700px)}h1{font-size:clamp(32px,7vw,66px);margin:0;line-height:.9}h1 b{color:#ffd84a}.card button{margin-top:20px;padding:13px 24px;background:#050505;color:#fff;border:3px solid #fff;font:bold 20px monospace}.hide{display:none}@media(orientation:portrait) and (max-width:850px){#rot{display:grid}}#rot{display:none;position:fixed;inset:0;background:#000;z-index:30;place-items:center;text-align:center;font-weight:bold}</style></head><body><canvas id="g" width="960" height="540"></canvas><button class="b" id="u">▲</button><button class="b" id="d">▼</button><button class="b" id="l">◀</button><button class="b" id="r">▶</button><button class="b" id="ok">決定</button><button class="b" id="bk">戻る</button><div id="start" class="ov"><div class="card"><h1>ANGEL <b>CORE</b></h1><p>トシユキ、カズアキ、マッピー、ケイタ、イサジ、リョウゴ<br>VS 翼の機械天使</p><button id="go">戦闘開始</button><p>ターン制＋弾幕回避RPG</p></div></div><div id="end" class="ov hide"><div class="card"><h1 id="et">VICTORY</h1><p id="ep"></p><button id="again">もう一度</button></div></div><div id="rot">iPhoneを横向きにしてください</div><script src="game.js"></script></body></html>
