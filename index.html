<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#03050a">
<title>PYRAMID BREAK ZERO - DAYBREAK v2</title>
<style>
*{box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
body{display:grid;place-items:center}
#wrap{position:relative;width:100vw;height:100dvh;background:#000}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;touch-action:none}
#start,#end{position:absolute;inset:0;z-index:20;background:radial-gradient(circle at 50% 35%,#273957,#070912 63%,#010103);display:grid;place-items:center;padding:22px}
.card{width:min(92vw,780px);padding:26px;border:4px solid #fff;background:#020306f2;text-align:center;box-shadow:0 0 45px #000}
.logo{font-size:clamp(34px,7vw,70px);font-weight:1000;line-height:.86;text-shadow:5px 5px 0 #203b67}.logo b{color:#ffd75a}
.card button{margin-top:18px;padding:14px 28px;border:3px solid #fff;background:#05070d;color:#fff;font:900 20px monospace}
.small{font-size:12px;line-height:1.7;color:#c7d1dd}.hidden{display:none!important}
#rotate{display:none;position:absolute;inset:0;z-index:50;background:#000;place-items:center;text-align:center;padding:28px;font-weight:900}
@media(orientation:portrait) and (max-width:850px){#rotate{display:grid}}
</style>
</head>
<body>
<div id="wrap">
<canvas id="game" width="960" height="540"></canvas>
<div id="start"><div class="card">
<div class="logo">PYRAMID BREAK ZERO<br><b>DAYBREAK II</b></div>
<p>タップ操作専用・感動型ボス戦RPG</p>
<button id="go">物語を始める</button>
<p class="small">メニューは直接タップ。弾幕中はハートを指でドラッグ。<br>ハートには強い縁取り・光・残像を付け、弾幕の中でも見失いにくくしています。</p>
</div></div>
<div id="end" class="hidden"><div class="card"><div class="logo" id="endTitle">DAYBREAK</div><p id="endText"></p><button id="again">もう一度</button></div></div>
<div id="rotate">iPhoneを横向きにしてください</div>
</div>
<script>
(()=>{"use strict";
const cv=document.getElementById("game"),g=cv.getContext("2d");g.imageSmoothingEnabled=false;
const W=960,H=540,arena={x:170,y:260,w:620,h:228};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),rnd=(a,b)=>a+Math.random()*(b-a);
let scene="opening",sub="dialog",last=0,sel=0,active=0,turn=0,bond=0,score=0,shake=0,flash=0;
let dialogue=[],di=0,after=null,msg="",msgT=0,bullets=[],particles=[],trails=[];
let attackX=230,attackDir=1,defT=0,patternId=0,patternClock=0,freeze=0,foresight=false,guard=false,berserk=0;
let deaths=0,sacrifices=0,talkCount=0,perfects=0;
let audio=null,musicTimer=null,musicMood="quiet",noteStep=0;
const items={herb:5,dew:3,leaf:2,ether:3};
const party=[
{name:"トシユキ",max:120,hp:120,mp:75,mm:75,c:"#6d5eb0",skill:"ザ・ワールド",quote:"時間は止められる。でも、想いまでは止められない。",pow:20,spd:1},
{name:"カズアキ",max:190,hp:190,mp:48,mm:48,c:"#754a3e",skill:"ワールド・イズ・マイン",quote:"全部背負う。それが俺の役目だ。",pow:36,spd:.84},
{name:"マッピー",max:115,hp:115,mp:90,mm:90,c:"#cda75e",skill:"ピラミッド・ハート",quote:"勝つんじゃない。みんなで帰るんだ。",pow:16,spd:1},
{name:"ケイタ",max:125,hp:125,mp:75,mm:75,c:"#ed912f",skill:"鳳翼天翔",quote:"燃え尽きても、朝はまた来る。",pow:26,spd:1.2},
{name:"イサジ",max:175,hp:175,mp:44,mm:44,c:"#ebc34e",skill:"領域展開・鬼",quote:"怖くても進む。それが俺たちだ。",pow:33,spd:.92},
{name:"リョウゴ",max:130,hp:130,mp:80,mm:80,c:"#3f8bc7",skill:"虫の知らせ",quote:"未来は決まってない。だから見に行く。",pow:23,spd:1.32}
];
const boss={name:"機械天使 アルカ・セラフ",max:3000,hp:3000,phase:1,armor:10,resolve:120,mercy:0,weak:"none"};
const heart={x:480,y:380,r:9,inv:0,mode:"red",vy:0,drag:false,offX:0,offY:0};
const actions=["たたかう","わざ","どうぐ","まもる","はなす","こうたい"];
const menuRects=[];
function ac(){if(!audio)audio=new(window.AudioContext||window.webkitAudioContext)}
function beep(f=220,d=.08,t="sine",v=.025){if(!audio)return;const o=audio.createOscillator(),a=audio.createGain();o.type=t;o.frequency.value=f;a.gain.value=v;o.connect(a);a.connect(audio.destination);o.start();a.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+d);o.stop(audio.currentTime+d)}
function music(){if(musicTimer)return;musicTimer=setInterval(()=>{const seq=musicMood==="quiet"?[220,277,330,392,330,277,247,220]:musicMood==="hope"?[196,247,294,392,440,392,330,294,220,277,330,440,494,440,392,330]:musicMood==="despair"?[82,98,110,123,110,98,73,82]:[110,147,165,196,220,247,220,196,123,165,185,247,277,247,220,185];const f=seq[noteStep++%seq.length];beep(f,.18,musicMood==="quiet"?"sine":"triangle",musicMood==="quiet"?.018:.016);if(noteStep%8===0)beep(f/2,.38,"sine",.012)},170)}
function say(a,f=null){dialogue=Array.isArray(a)?a:[a];di=0;sub="dialog";after=f}
function nextDialog(){di++;if(di>=dialogue.length){sub="choose";if(after){const f=after;after=null;f()}}}
function toast(s,t=1.1){msg=s;msgT=t}
function part(x,y,c,n=12,p=1){for(let i=0;i<n;i++)particles.push({x,y,vx:rnd(-190,190)*p,vy:rnd(-240,90)*p,l:rnd(.3,.8),c,s:rnd(2,7)})}
function current(){if(party[active].hp<=0){const i=party.findIndex(p=>p.hp>0);active=i<0?0:i}return party[active]}
function reset(){
party.forEach(p=>{p.hp=p.max;p.mp=p.mm});Object.assign(boss,{hp:boss.max,phase:1,armor:10,resolve:120,mercy:0,weak:"none"});Object.assign(items,{herb:5,dew:3,leaf:2,ether:3});
scene="opening";sub="dialog";active=turn=sel=bond=score=shake=flash=0;deaths=sacrifices=talkCount=perfects=0;bullets=[];particles=[];trails=[];freeze=0;foresight=guard=false;berserk=0;musicMood="quiet";
say(["――空から、壊れた神が落ちてきた。","その翼は祈りではなく、命令で動いていた。","機械天使「私は、終わらせるために作られた。」","トシユキ「じゃあ俺たちは、始めるために来た。」"],()=>{scene="menu";sub="choose";toast("六人の物語が始まる。",1.4)})
}
function damageBoss(n){n=Math.max(1,Math.floor(n-boss.armor));boss.hp-=n;score+=n*10;shake=12;flash=.08;part(480,125,"#fff",24,1.4);beep(80,.16,"square",.06);if(boss.hp<=0){boss.hp=0;combatEnd()}}
function chooseAction(index){
sel=index;
if(index===0){scene="attack";attackX=230;attackDir=1;sub="play"}
if(index===1){scene="skill";sub="choose"}
if(index===2){scene="item";sub="choose"}
if(index===3){guard=true;bond=Math.min(100,bond+13);say([current().name+"は仲間の前に立った。","「ここは俺が受ける。」"],beginDefense)}
if(index===4)talk()
if(index===5){scene="switch";sub="choose"}
}
function useSkill(){
const p=current(),cost=[26,32,32,32,30,25][active];if(p.mp<cost)return toast("MPが足りない");p.mp-=cost;flash=.18;shake=10;
if(active===0){freeze=4.2;bond=Math.min(100,bond+20);party.forEach(a=>{if(a.hp<=0){a.hp=Math.ceil(a.max*.32);deaths=Math.max(0,deaths-1)}});say([p.quote,"倒れた仲間たちの時間が、もう一度だけ動き出す。"],beginDefense)}
if(active===1){p.hp=Math.max(1,p.hp-Math.ceil(p.max*.25));sacrifices++;boss.armor=0;damageBoss(175);bond=Math.min(100,bond+16);say([p.quote,"カズアキは自分の命を刃に変えた。"],beginDefense)}
if(active===2){party.forEach(a=>a.hp=Math.min(a.max,a.hp+40));boss.resolve=Math.max(0,boss.resolve-8);bond=Math.min(100,bond+22);say([p.quote,"黄金の結界が、六人の鼓動を一つにした。"],beginDefense)}
if(active===3){party.forEach(a=>{if(a.hp<=0){a.hp=Math.ceil(a.max*.55);deaths=Math.max(0,deaths-1)}else a.hp=Math.min(a.max,a.hp+26)});p.hp=1;sacrifices++;bond=Math.min(100,bond+28);say([p.quote,"不死鳥は灰の中から、仲間の名前を呼んだ。"],beginDefense)}
if(active===4){berserk=3;damageBoss(125);bond=Math.min(100,bond+10);say([p.quote,"鬼の力が、怒りではなく仲間を守るために目覚めた。"],beginDefense)}
if(active===5){foresight=true;boss.weak=["fire","power","heart"][Math.floor(Math.random()*3)];bond=Math.min(100,bond+18);damageBoss(55);say([p.quote,"危険な未来だけが、青い残像になって浮かんだ。"],beginDefense)}
}
function useItem(i){
const p=current();
if(i===0){if(!items.herb)return toast("やくそうがない");items.herb--;p.hp=Math.min(p.max,p.hp+65);bond=Math.min(100,bond+7);say([p.name+"はやくそうを使った。","苦い味が、生きていることを思い出させた。"],beginDefense)}
if(i===1){if(!items.dew)return toast("しずくがない");items.dew--;party.forEach(a=>a.hp=Math.min(a.max,a.hp+48));bond=Math.min(100,bond+15);say(["せかいじゅのしずくが、六人の傷に降り注いだ。"],beginDefense)}
if(i===2){if(!items.leaf)return toast("葉がない");const d=party.find(a=>a.hp<=0);if(!d)return toast("今は必要ない");items.leaf--;d.hp=Math.ceil(d.max*.65);deaths=Math.max(0,deaths-1);bond=Math.min(100,bond+20);say([d.name+"は、遠い声に呼び戻された。"],beginDefense)}
if(i===3){if(!items.ether)return toast("せいすいがない");items.ether--;p.mp=Math.min(p.mm,p.mp+50);say([p.name+"のMPが回復した。"],beginDefense)}
}
function talk(){
talkCount++;const q=[
["マッピー「あなたは、誰かに止めてほしいんじゃないのか？」","機械天使「……命令に、願いは必要ない。」"],
["リョウゴ「未来には、君が泣いている姿が見える。」","機械天使「私は、泣く機能を持たない。」"],
["ケイタ「機能じゃなくても、痛いものは痛い。」","翼の一枚が、わずかに震えた。"],
["トシユキ「帰りたい気持ちを選べ。」","機械天使「帰る場所など、私にはない。」"],
["イサジ「なら作ればいい。俺たちもそうしてきた。」","機械天使の瞳から、光が一滴こぼれた。"],
["カズアキ「帰る場所は、誰かと一緒に作るものだ。」","機械天使「……私にも、できますか？」"]
];const i=Math.min(q.length-1,Math.floor(boss.mercy/20));boss.mercy+=20;boss.resolve=Math.max(0,boss.resolve-20);bond=Math.min(100,bond+16);say(q[i],()=>{if(boss.resolve<=0&&bond>=75)peaceEnd();else beginDefense()})
}
function attackTap(){const q=1-Math.abs(480-attackX)/250,m=current().pow*(.75+clamp(q,0,1)*1.9);if(q>.9)perfects++;damageBoss(m*((berserk&&active===4)?1.8:1));toast(q>.9?"PERFECT!":q>.58?"GOOD!":"HIT");setTimeout(beginDefense,600)}
function sixLink(){bond=0;musicMood="hope";flash=.35;shake=18;say(["絆が、六人の心を一つにつないだ。","トシユキ「止める。」――時が静止する。","カズアキ「俺が道を作る。」――装甲が断たれる。","リョウゴ「未来は見えた。」――弱点が光る。","イサジ「全部ぶっ壊す。」――鬼の拳が空を裂く。","ケイタ「終わらせよう。」――不死鳥が夜を焼く。","マッピー「みんな、帰ろう。」","六人連携奥義――『DAYBREAK』"],()=>{damageBoss(620);if(boss.hp>0)beginDefense()})}
function beginDefense(){if(boss.hp<=0)return;if(bond>=100)return sixLink();scene="defense";sub="play";defT=boss.phase===3?9.4:boss.phase===2?8:6.8;patternClock=0;bullets=[];trails=[];heart.x=480;heart.y=380;heart.inv=.6;heart.mode=boss.phase===2?"blue":"red";heart.vy=0;patternId=(turn+boss.phase*3)%10;spawnPattern(patternId)}
function spawnPattern(id){
if(id===0)for(let i=0;i<16;i++)bullets.push({x:190+i*39,y:260-rnd(0,140),vx:rnd(-20,20),vy:145+rnd(0,75),r:6,c:"#eef7ff",k:"rain"});
if(id===1)for(let i=0;i<18;i++){const a=i*Math.PI*2/18;bullets.push({x:480+Math.cos(a)*260,y:375+Math.sin(a)*130,vx:-Math.cos(a)*170,vy:-Math.sin(a)*170,r:7,c:"#ffd761",k:"orbit"})}
if(id===2)for(let i=0;i<10;i++)bullets.push({x:i%2?790:150,y:280+i*22,vx:i%2?-240:240,vy:0,r:7,c:"#ff667b",k:"laser",warn:.8});
if(id===3)for(let i=0;i<8;i++)bullets.push({x:480,y:375,vx:rnd(-270,270),vy:rnd(-230,230),r:9,c:"#c96cff",k:"split",life:1.5});
if(id===4)for(let i=0;i<6;i++)bullets.push({x:rnd(220,740),y:rnd(290,460),vx:0,vy:0,r:16,c:"#101018",k:"black"});
if(id===5)for(let i=0;i<14;i++)bullets.push({x:200+i*43,y:i%2?300:460,vx:0,vy:i%2?130:-130,r:6,c:i%3?"#fff":"#55baff",k:"wall"});
if(id===6)for(let i=0;i<12;i++)bullets.push({x:rnd(200,760),y:rnd(280,470),vx:rnd(-70,70),vy:rnd(-70,70),r:7,c:i%2?"#fff":"#5be6ff",k:"fake",fake:i%3===0});
if(id===7)for(let i=0;i<16;i++){const a=i*Math.PI*2/16;bullets.push({x:480,y:375,vx:Math.cos(a)*210,vy:Math.sin(a)*210,r:7,c:"#ffcf58",k:"burst"})}
if(id===8)for(let i=0;i<9;i++)bullets.push({x:i%2?760:200,y:290+i*22,vx:i%2?-170:170,vy:Math.sin(i)*80,r:10,c:"#ff8b45",k:"missile"});
if(id===9){bullets.push({x:480,y:375,vx:0,vy:0,r:28,c:"#202038",k:"gravity"});for(let i=0;i<10;i++)bullets.push({x:rnd(200,760),y:rnd(280,470),vx:rnd(-100,100),vy:rnd(-100,100),r:6,c:"#fff",k:"star"})}
}
function updateDefense(dt){
if(freeze>0){freeze-=dt;defT-=dt*.3;return}
patternClock+=dt;const speed=current().spd;
if(heart.drag){trails.push({x:heart.x,y:heart.y,l:.32});if(trails.length>18)trails.shift()}
if(heart.mode==="blue"){heart.vy+=600*dt;heart.y+=heart.vy*dt;if(heart.y>arena.y+arena.h-12){heart.y=arena.y+arena.h-12;heart.vy=0}}
for(const b of bullets){
if(b.warn>0){b.warn-=dt;continue}
if(b.k==="black"){const dx=b.x-heart.x,dy=b.y-heart.y,l=Math.hypot(dx,dy)||1;heart.x+=dx/l*45*dt;heart.y+=dy/l*45*dt}
if(b.k==="gravity"){const dx=b.x-heart.x,dy=b.y-heart.y,l=Math.hypot(dx,dy)||1;heart.x+=dx/l*95*dt;heart.y+=dy/l*95*dt}
if(b.k==="missile"){const dx=heart.x-b.x,dy=heart.y-b.y,l=Math.hypot(dx,dy)||1;b.vx+=dx/l*75*dt;b.vy+=dy/l*75*dt}
b.x+=b.vx*dt;b.y+=b.vy*dt;
if(b.k==="rain"&&b.y>arena.y+arena.h){b.y=arena.y-20;b.x=rnd(arena.x,arena.x+arena.w)}
if(b.k==="split"){b.life-=dt;if(b.life<0){b.life=999;for(let i=0;i<4;i++){const a=i*Math.PI/2;bullets.push({x:b.x,y:b.y,vx:Math.cos(a)*190,vy:Math.sin(a)*190,r:5,c:"#ff9cff",k:"piece"})}}}
if(b.k==="fake"&&b.fake)continue;
if(Math.hypot(b.x-heart.x,b.y-heart.y)<b.r+heart.r&&heart.inv<=0){hurt(boss.phase===3?25:boss.phase===2?19:15);heart.inv=.8;part(heart.x,heart.y,"#ff4760",14);shake=9}
}
heart.x=clamp(heart.x,arena.x+12,arena.x+arena.w-12);heart.y=clamp(heart.y,arena.y+12,arena.y+arena.h-12);heart.inv=Math.max(0,heart.inv-dt);defT-=dt;
if(defT<=0){foresight=guard=false;berserk=Math.max(0,berserk-1);nextTurn()}
}
function hurt(n){if(guard){n=Math.ceil(n*.55);bond=Math.min(100,bond+5)}const p=current();p.hp-=n;if(p.hp<=0){p.hp=0;deaths++;const a=party.filter(x=>x.hp>0);if(!a.length)return gameOver();active=party.indexOf(a[0])}}
function nextTurn(){turn++;boss.phase=boss.hp<850?3:boss.hp<1900?2:1;if(boss.phase===2)musicMood="battle";if(boss.phase===3)musicMood="despair";active=(active+1)%party.length;if(party[active].hp<=0){const i=party.findIndex(p=>p.hp>0);active=i}current().mp=Math.min(current().mm,current().mp+9);scene="menu";sub="choose";bullets=[];trails=[];toast(current().name+"のターン")}
function peaceEnd(){scene="ending";musicMood="hope";say(["機械天使は、武器を降ろした。","機械天使「私も、朝を見てもいいのですか？」","六人「もちろん。」","翼から外れた歯車は、花びらのように舞った。","トシユキ「今日は、いい日になりそうだ。」"],()=>finish("TRUE DAYBREAK","誰も倒れず、機械天使を救った。"))}
function combatEnd(){scene="ending";musicMood="hope";say(["最後の一撃が、機械天使の胸を貫いた。","けれど誰も、勝ったとは思わなかった。","機械天使「ありがとう……ようやく眠れる。」","マッピー「眠るんじゃない。次は朝を見に行こう。」"],()=>{let title="HUMAN END",text="戦いの果てに、七人は朝日を見た。";if(sacrifices>=2){title="SACRIFICE END";text="誰かの命が、みんなの朝を守った。"}else if(berserk>0){title="CHAOS END";text="鬼の力は勝利と引き換えに、静かな傷を残した。"}else if(perfects>=6&&deaths===0){title="HERO END";text="六人は誰も倒れず、力で夜を越えた。"}finish(title,text)})}
function finish(title,text){scene="end";document.getElementById("endTitle").textContent=title;document.getElementById("endText").textContent=text+"\\nSCORE "+score+"\\n会話 "+talkCount+"回 / 犠牲 "+sacrifices+"回";document.getElementById("end").classList.remove("hidden")}
function gameOver(){scene="end";document.getElementById("endTitle").textContent="NIGHT END";document.getElementById("endText").textContent="それでも、物語はここで終わらない。";document.getElementById("end").classList.remove("hidden")}
function update(dt){msgT=Math.max(0,msgT-dt);shake*=.86;flash=Math.max(0,flash-dt);particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=420*dt;p.l-=dt});particles=particles.filter(p=>p.l>0);trails.forEach(t=>t.l-=dt);trails=trails.filter(t=>t.l>0);if(scene==="attack"){attackX+=attackDir*dt*430;if(attackX>730){attackX=730;attackDir=-1}if(attackX<230){attackX=230;attackDir=1}}if(scene==="defense")updateDefense(dt)}
function R(x,y,w,h,c){g.fillStyle=c;g.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h))}
function T(s,x,y,z=18,c="#fff",a="left"){g.fillStyle=c;g.font=`900 ${z}px monospace`;g.textAlign=a;g.fillText(s,x,y)}
function drawBoss(){g.save();g.translate(480,118);g.strokeStyle=boss.phase===3?"#ff6879":"#ecf6ff";g.lineWidth=7;for(const s of[-1,1]){g.save();g.scale(s,1);const w=boss.phase===1?4:boss.phase===2?7:10;for(let i=0;i<w;i++){g.beginPath();g.moveTo(42,0);g.lineTo(92+i*15,-58+i*12);g.lineTo(150+i*17,-42+i*13);g.stroke()}g.restore()}R(-65,-50,130,118,"#7c8896");R(-51,-37,102,90,"#171d25");g.fillStyle="#d6b66a";g.beginPath();g.moveTo(0,-105);g.lineTo(-50,-30);g.lineTo(50,-30);g.fill();R(-19,-63,38,17,"#f3fbff");R(-8,-60,16,12,"#56bdff");R(-3,-56,6,6,"#000");if(boss.phase>=2){g.strokeStyle=boss.phase===3?"#ff4f72":"#ffd85a";g.lineWidth=4;g.beginPath();g.arc(0,-64,78+Math.sin(performance.now()/120)*8,0,Math.PI*2);g.stroke()}g.restore()}
function drawHeart(){
for(const t of trails){g.globalAlpha=t.l/.32*.45;g.fillStyle="#fff";g.beginPath();g.arc(t.x,t.y,heart.r+5,0,Math.PI*2);g.fill()}g.globalAlpha=1;

function canvasPos(e){const r=cv.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return{x:(p.clientX-r.left)*W/r.width,y:(p.clientY-r.top)*H/r.height}}
