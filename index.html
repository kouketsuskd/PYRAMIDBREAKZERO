<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#03050a">
<title>PYRAMID BREAK ZERO - DAYBREAK v2</title>
<style>
*{box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
body{display:grid;place-items:center}
#wrap{position:relative;width:100vw;height:100dvh;background:#000}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;touch-action:none}
#start,#end{position:absolute;inset:0;z-index:20;background:radial-gradient(circle at 50% 35%,#273957,#070912 63%,#010103);display:grid;place-items:center;padding:22px}
.card{width:min(92vw,780px);padding:26px;border:4px solid #fff;background:#020306f2;text-align:center;box-shadow:0 0 45px #000}
.logo{font-size:clamp(34px,7vw,70px);font-weight:1000;line-height:.86;text-shadow:5px 5px 0 #203b67}.logo b{color:#ffd75a}
.card button{margin-top:18px;padding:14px 28px;border:3px solid #fff;background:#05070d;color:#fff;font:900 20px monospace}
.small{font-size:12px;line-height:1.7;color:#c7d1dd}.hidden{display:none!important}
#rotate{display:none;position:absolute;inset:0;z-index:50;background:#000;place-items:center;text-align:center;padding:28px;font-weight:900}
@media(orientation:landscape) and (max-height:850px){#rotate{display:grid}}
</style>
</head>
<body>
<div id="wrap">
<canvas id="game" width="540" height="960"></canvas>
<div id="start"><div class="card">
<div class="logo">PYRAMID BREAK ZERO<br><b>DAYBREAK VIII</b></div>
<p>縦画面・敵ターン／必殺技 完全修正版</p>
<button id="go">物語を始める</button>
<p class="small">スマホ縦画面専用。メニューは直接タップ、弾幕中はハートを指でドラッグ。<br>ハートには強い縁取り・光・残像を付け、弾幕の中でも見失いにくくしています。</p>
</div></div>
<div id="end" class="hidden"><div class="card"><div class="logo" id="endTitle">DAYBREAK</div><p id="endText"></p><button id="again">もう一度</button></div></div>
<div id="rotate">iPhoneを縦向きにしてください</div>
</div>
<script>
(()=>{"use strict";
const cv=document.getElementById("game"),g=cv.getContext("2d");g.imageSmoothingEnabled=false;
const W=540,H=960,arena={x:40,y:300,w:460,h:430};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),rnd=(a,b)=>a+Math.random()*(b-a);
let scene="opening",sub="dialog",last=0,sel=0,active=0,turn=0,bond=0,score=0,shake=0,flash=0;
let dialogue=[],di=0,after=null,msg="",msgT=0,bullets=[],particles=[],trails=[];
let attackX=70,attackDir=1,defT=0,patternId=0,patternClock=0,freeze=0,foresight=false,guard=false,berserk=0;
let deaths=0,sacrifices=0,talkCount=0,perfects=0;
let skillFx={t:0,type:"",name:"",color:"#fff"};let damagePop=[];
let attackTime=0,attackHits=0,attackTotal=0,attackEnded=false,attackLastQuality=0;
let skillGame=null;let memoryGame={timer:0,phase:0,progress:0,choice:-1,targets:[],held:false};
let platform={x:70,y:640,vx:0,vy:0,ground:690,camera:0,goal:1320,dead:false,coins:0,lives:3,checkpoint:70,won:false,tutorialPage:0,ready:false};
let beam={timer:0,aimX:270,aimY:500,shots:0,cores:[],bossX:270,bossY:450,drag:false};
let seal={timer:0,index:0,nodes:[]};
let gimmickLock=false;
let bossFx={hit:0,charge:0,roar:0,transform:0,blink:0,tilt:0,wing:0,hover:0,core:0,attack:0};
let bgStars=[];for(let i=0;i<70;i++)bgStars.push({x:Math.random()*540,y:Math.random()*960,s:Math.random()*2+1,v:Math.random()*18+8,a:Math.random()});
let audio=null,musicTimer=null,musicMood="quiet",noteStep=0;
const items={herb:5,dew:3,leaf:2,ether:3};
const party=[
{name:"トシユキ",max:120,hp:120,mp:75,mm:75,c:"#6d5eb0",skill:"ザ・ワールド",quote:"時間は止められる。でも、想いまでは止められない。",pow:20,spd:1},
{name:"カズアキ",max:190,hp:190,mp:48,mm:48,c:"#754a3e",skill:"ワールド・イズ・マイン",quote:"全部背負う。それが俺の役目だ。",pow:36,spd:.84},
{name:"マッピー",max:115,hp:115,mp:90,mm:90,c:"#cda75e",skill:"ピラミッド・ハート",quote:"勝つんじゃない。みんなで帰るんだ。",pow:16,spd:1},
{name:"ケイタ",max:125,hp:125,mp:75,mm:75,c:"#ed912f",skill:"鳳翼天翔",quote:"燃え尽きても、朝はまた来る。",pow:26,spd:1.2},
{name:"イサジ",max:175,hp:175,mp:44,mm:44,c:"#ebc34e",skill:"領域展開・鬼",quote:"怖くても進む。それが俺たちだ。",pow:33,spd:.92},
{name:"リョウゴ",max:130,hp:130,mp:80,mm:80,c:"#3f8bc7",skill:"虫の知らせ",quote:"未来は決まってない。だから見に行く。",pow:23,spd:1.32}
];
const boss={name:"機械天使 アルカ・セラフ",max:3000,hp:3000,phase:1,armor:10,resolve:120,mercy:0,weak:"none"};
const heart={x:480,y:380,r:9,inv:0,mode:"red",vy:0,drag:false,offX:0,offY:0};
const actions=["たたかう","わざ","どうぐ","まもる","はなす","こうたい"];
const menuRects=[];
function ac(){if(!audio)audio=new(window.AudioContext||window.webkitAudioContext)}
function beep(f=220,d=.08,t="sine",v=.025){if(!audio)return;const o=audio.createOscillator(),a=audio.createGain();o.type=t;o.frequency.value=f;a.gain.value=v;o.connect(a);a.connect(audio.destination);o.start();a.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+d);o.stop(audio.currentTime+d)}
function music(){if(musicTimer)return;musicTimer=setInterval(()=>{const seq=musicMood==="quiet"?[220,277,330,392,330,277,247,220]:musicMood==="hope"?[196,247,294,392,440,392,330,294,220,277,330,440,494,440,392,330]:musicMood==="despair"?[82,98,110,123,110,98,73,82]:[110,147,165,196,220,247,220,196,123,165,185,247,277,247,220,185];const f=seq[noteStep++%seq.length];beep(f,.18,musicMood==="quiet"?"sine":"triangle",musicMood==="quiet"?.018:.016);if(noteStep%8===0)beep(f/2,.38,"sine",.012)},170)}
function say(a,f=null){dialogue=Array.isArray(a)?a:[a];di=0;sub="dialog";after=f}
function nextDialog(){di++;if(di>=dialogue.length){sub="choose";if(after){const f=after;after=null;f()}}}
function toast(s,t=1.1){msg=s;msgT=t}
function part(x,y,c,n=12,p=1){for(let i=0;i<n;i++)particles.push({x,y,vx:rnd(-190,190)*p,vy:rnd(-240,90)*p,l:rnd(.3,.8),c,s:rnd(2,7)})}
function current(){if(party[active].hp<=0){const i=party.findIndex(p=>p.hp>0);active=i<0?0:i}return party[active]}
function reset(){
party.forEach(p=>{p.hp=p.max;p.mp=p.mm});Object.assign(boss,{hp:boss.max,phase:1,armor:10,resolve:120,mercy:0,weak:"none"});Object.assign(items,{herb:5,dew:3,leaf:2,ether:3});
scene="opening";sub="dialog";active=turn=sel=bond=score=shake=flash=0;deaths=sacrifices=talkCount=perfects=0;skillFx={t:0,type:"",name:"",color:"#fff"};damagePop=[];
bossFx={hit:0,charge:0,roar:0,transform:0,blink:0,tilt:0,wing:0,hover:0,core:0,attack:0};
attackTime=attackHits=attackTotal=attackLastQuality=0;attackEnded=false;skillGame=null;memoryGame={timer:0,phase:0,progress:0,choice:-1,targets:[],held:false};gimmickLock=false;
platform={x:55,y:660,vx:0,vy:0,ground:680,camera:0,goal:1550,dead:false,coins:0};
beam={timer:0,aimX:270,aimY:500,shots:0,cores:[],bossX:270,bossY:450,drag:false};
seal={timer:0,index:0,nodes:[]};bullets=[];particles=[];trails=[];freeze=0;foresight=guard=false;berserk=0;musicMood="quiet";
say(["――空から、壊れた神が落ちてきた。","その翼は祈りではなく、命令で動いていた。","機械天使「私は、終わらせるために作られた。」","トシユキ「じゃあ俺たちは、始めるために来た。」"],()=>{scene="menu";sub="choose";toast("六人の物語が始まる。",1.4)})
}
function damageBoss(n){n=Math.max(1,Math.floor(n-boss.armor));boss.hp-=n;score+=n*10;damagePop.push({x:270,y:220,v:-105,l:1.15,n:Math.floor(n),crit:n>=120});shake=12;flash=.08;part(270,220,"#fff",24,1.4);beep(80,.16,"square",.06);if(boss.hp<=0){boss.hp=0;combatEnd()}}
function chooseAction(index){
sel=index;
if(index===0){scene="attack";attackX=70;attackDir=1;attackTime=3.6;attackHits=0;attackTotal=0;attackEnded=false;sub="play"}
if(index===1){scene="skill";sub="choose"}
if(index===2){scene="item";sub="choose"}
if(index===3){guard=true;bond=Math.min(100,bond+13);say([current().name+"は仲間の前に立った。","「ここは俺が受ける。」"],beginDefense)}
if(index===4)talk()
if(index===5){scene="switch";sub="choose"}
}
function useSkill(){
const p=current(),cost=[26,32,32,32,30,25][active];
if(p.mp<cost){skillFx={t:0,type:"",name:"",color:"#fff"};scene="menu";sub="choose";toast("MPが足りない ― コマンドに戻ります",1.5);beep(90,.18,"square",.05);return}
p.mp-=cost;
const types=["clock","slash","pyramid","phoenix","oni","future"];
skillFx={t:0,type:types[active],name:p.skill,color:p.c};
memoryGame={timer:8.5,phase:0,progress:0,choice:-1,targets:[],held:false};
scene="skillstory";sub="play";
const sets=[
[{x:110,y:470,r:34,label:"過去",good:false},{x:270,y:390,r:34,label:"今",good:true},{x:430,y:510,r:34,label:"未来",good:false}],
[{x:135,y:430,r:38,label:"自分",good:false},{x:405,y:430,r:38,label:"仲間",good:true}],
[{x:135,y:420,r:36,label:"勝つ",good:false},{x:270,y:520,r:36,label:"帰る",good:true},{x:405,y:420,r:36,label:"逃げる",good:false}],
[{x:120,y:500,r:32,label:"灰",good:false},{x:270,y:390,r:32,label:"名前",good:true},{x:420,y:500,r:32,label:"炎",good:false}],
[{x:135,y:440,r:38,label:"怒り",good:false},{x:405,y:440,r:38,label:"守る",good:true}],
[{x:110,y:520,r:34,label:"絶望",good:false},{x:270,y:400,r:34,label:"選ぶ",good:true},{x:430,y:520,r:34,label:"諦め",good:false}]
];
memoryGame.targets=sets[active];
}
function resolveSkill(success){
const p=current(),bonus=success?1.55:1.0;memoryGame.timer=0;
if(active===0){party.forEach(a=>{if(a.hp<=0){a.hp=Math.ceil(a.max*.35);deaths=Math.max(0,deaths-1)}a.hp=Math.min(a.max,a.hp+Math.floor(20*bonus))});bond=Math.min(100,bond+(success?24:15));say([p.quote,success?"トシユキは『今』を選んだ。止めた時間を、仲間のためにもう一度動かす。":"秒針は迷いながらも、仲間の鼓動を探した。"],beginDefense)}
if(active===1){p.hp=Math.max(1,p.hp-Math.ceil(p.max*.20));sacrifices++;boss.armor=0;damageBoss(145*bonus);bond=Math.min(100,bond+(success?20:12));say([p.quote,success?"カズアキは自分ではなく、仲間の名前を斬撃に刻んだ。":"刃は震えた。それでも前へ進んだ。"],beginDefense)}
if(active===2){party.forEach(a=>a.hp=Math.min(a.max,a.hp+Math.floor(40*bonus)));boss.resolve=Math.max(0,boss.resolve-(success?14:8));bond=Math.min(100,bond+(success?26:16));say([p.quote,success?"マッピーは『勝つ』より先に『帰る』を選んだ。":"黄金の結界は、帰る場所の形を探した。"],beginDefense)}
if(active===3){party.forEach(a=>{if(a.hp<=0){a.hp=Math.ceil(a.max*.55);deaths=Math.max(0,deaths-1)}else a.hp=Math.min(a.max,a.hp+Math.floor(26*bonus))});p.hp=1;sacrifices++;bond=Math.min(100,bond+(success?30:18));say([p.quote,success?"炎ではなく、呼び続けた名前が不死鳥を生んだ。":"灰の中で、かすかな声が仲間を呼んだ。"],beginDefense)}
if(active===4){berserk=3;damageBoss(110*bonus);bond=Math.min(100,bond+(success?18:10));say([p.quote,success?"イサジは怒りではなく『守る』を選んだ。鬼の拳が静かに燃える。":"鬼は暴れた。だが最後の一撃だけは仲間を守った。"],beginDefense)}
if(active===5){foresight=true;boss.weak=["fire","power","heart"][Math.floor(Math.random()*3)];bond=Math.min(100,bond+(success?22:14));damageBoss(52*bonus);say([p.quote,success?"リョウゴは見えた未来ではなく、選び直す未来を信じた。":"青い残像の向こうに、まだ消えていない道が見えた。"],beginDefense)}
}function useItem(i){
const p=current();
if(i===0){if(!items.herb)return toast("やくそうがない");items.herb--;p.hp=Math.min(p.max,p.hp+65);bond=Math.min(100,bond+7);say([p.name+"はやくそうを使った。","苦い味が、生きていることを思い出させた。"],beginDefense)}
if(i===1){if(!items.dew)return toast("しずくがない");items.dew--;party.forEach(a=>a.hp=Math.min(a.max,a.hp+48));bond=Math.min(100,bond+15);say(["せかいじゅのしずくが、六人の傷に降り注いだ。"],beginDefense)}
if(i===2){if(!items.leaf)return toast("葉がない");const d=party.find(a=>a.hp<=0);if(!d)return toast("今は必要ない");items.leaf--;d.hp=Math.ceil(d.max*.65);deaths=Math.max(0,deaths-1);bond=Math.min(100,bond+20);say([d.name+"は、遠い声に呼び戻された。"],beginDefense)}
if(i===3){if(!items.ether)return toast("せいすいがない");items.ether--;p.mp=Math.min(p.mm,p.mp+50);say([p.name+"のMPが回復した。"],beginDefense)}
}
function talk(){
talkCount++;const q=[
["マッピー「あなたは、誰かに止めてほしいんじゃないのか？」","機械天使「……命令に、願いは必要ない。」"],
["リョウゴ「未来には、君が泣いている姿が見える。」","機械天使「私は、泣く機能を持たない。」"],
["ケイタ「機能じゃなくても、痛いものは痛い。」","翼の一枚が、わずかに震えた。"],
["トシユキ「帰りたい気持ちを選べ。」","機械天使「帰る場所など、私にはない。」"],
["イサジ「なら作ればいい。俺たちもそうしてきた。」","機械天使の瞳から、光が一滴こぼれた。"],
["カズアキ「帰る場所は、誰かと一緒に作るものだ。」","機械天使「……私にも、できますか？」"],["マッピー「君が壊したものより、これから守れるものを数えよう。」","機械天使「私は……守る側になれますか？」"],["トシユキ「過去は変えられない。でも、次の一秒は選べる。」","機械天使「次の一秒を……私にください。」"],
["機械天使「私は、壊した数しか覚えていない。」","マッピー「じゃあ今日から、守れた数を一緒に数えよう。」"],
["機械天使「朝は、私のようなものにも来ますか？」","リョウゴ「朝は誰かを選ばない。だから俺たちも君を選ぶ。」"]
];const i=Math.min(q.length-1,Math.floor(boss.mercy/20));boss.mercy+=20;boss.resolve=Math.max(0,boss.resolve-20);bond=Math.min(100,bond+16);say(q[i],()=>{if(boss.resolve<=0&&bond>=75)peaceEnd();else beginDefense()})
}
function attackTap(){
if(attackEnded||scene!=="attack")return;
const q=1-Math.abs(270-attackX)/200;
const quality=clamp(q,0,1);
attackLastQuality=quality;
const hit=Math.floor(current().pow*(.34+quality*.95)*(1+attackHits*.10));
attackHits++;attackTotal+=hit;
damageBoss(hit);
if(quality>.9){perfects++;bond=Math.min(100,bond+3);toast("PERFECT CHAIN ×"+attackHits,.45)}
else if(quality>.58)toast("GOOD ×"+attackHits,.4);
else toast("RUSH ×"+attackHits,.35);
attackDir*=-1;
attackX=clamp(attackX+(Math.random()<.5?-35:35),70,470);
if(attackHits>=7)finishComboAttack();
}
function finishComboAttack(){
if(attackEnded)return;
attackEnded=true;
const finisher=Math.floor(attackTotal*(attackHits>=5?.35:.15));
if(finisher>0)damageBoss(finisher);
damagePop.push({x:270,y:260,v:-80,l:1.25,n:"COMBO "+attackHits,crit:attackHits>=6});
setTimeout(()=>{if(boss.hp>0)beginDefense()},520);
}function sixLink(){bond=0;musicMood="hope";flash=.35;shake=18;say(["絆が、六人の心を一つにつないだ。","トシユキ「止める。」――時が静止する。","カズアキ「俺が道を作る。」――装甲が断たれる。","リョウゴ「未来は見えた。」――弱点が光る。","イサジ「全部ぶっ壊す。」――鬼の拳が空を裂く。","ケイタ「終わらせよう。」――不死鳥が夜を焼く。","マッピー「みんな、帰ろう。」","六人連携奥義――『DAYBREAK』"],()=>{damageBoss(620);if(boss.hp>0)beginDefense()})}
function beginDefense(){
if(boss.hp<=0||gimmickLock)return;
if(bond>=100)return sixLink();
if(turn>0&&turn%7===2)return beginPlatform();
if(turn>0&&turn%7===4)return beginBeam();
if(turn>0&&turn%7===6)return beginSeal();
bossFx.charge=.9;bossFx.attack=1.1;scene="defense";sub="play";defT=boss.phase===3?10.2:boss.phase===2?8.8:7.4;patternClock=0;bullets=[];trails=[];heart.x=270;heart.y=515;heart.inv=.6;heart.mode="red";heart.vy=0;patternId=(turn*3+boss.phase*5)%28;spawnPattern(patternId)
}
function beginPlatform(){
gimmickLock=true;scene="platformTutorial";sub="play";
platform={x:70,y:640,vx:0,vy:0,ground:690,camera:0,goal:1320,dead:false,coins:0,lives:3,checkpoint:70,won:false,tutorialPage:0,ready:false};
}
function beginBeam(){
gimmickLock=true;scene="beam";sub="play";
beam={timer:10.5,aimX:270,aimY:500,shots:0,bossX:270,bossY:430,drag:false,cores:[
{x:160,y:420,hp:3},{x:380,y:470,hp:3},{x:270,y:350,hp:4}]};
toast("機械天使のコアを照準して破壊せよ",1.4);
}
function beginSeal(){
gimmickLock=true;scene="seal";sub="play";
seal={timer:8.5,index:0,nodes:[]};
for(let i=0;i<7;i++)seal.nodes.push({x:rnd(80,460),y:rnd(340,690),r:25,n:i+1,hit:false});
toast("光る番号を順番に封印せよ",1.4);
}
function endGimmick(success){
if(!gimmickLock)return;
gimmickLock=false;
if(success){bond=Math.min(100,bond+16);damageBoss(70+boss.phase*25)}
else hurt(24+boss.phase*6);
if(boss.hp<=0||scene==="end")return;
nextTurn();
}
function spawnPattern(id){
const A=arena;
if(id===0)for(let i=0;i<18;i++)bullets.push({x:A.x+i*35,y:A.y-rnd(20,190),vx:rnd(-25,25),vy:155+rnd(0,90),r:6,c:"#eef7ff",k:"rain"});
if(id===1)for(let i=0;i<22;i++){const a=i*Math.PI*2/22;bullets.push({x:270+Math.cos(a)*210,y:515+Math.sin(a)*190,vx:-Math.cos(a)*185,vy:-Math.sin(a)*185,r:7,c:"#ffd761",k:"orbit"})}
if(id===2)for(let i=0;i<12;i++)bullets.push({x:i%2?A.x+A.w:A.x,y:A.y+18+i*17,vx:i%2?-265:265,vy:0,r:7,c:"#ff667b",k:"laser",warn:.72});
if(id===3)for(let i=0;i<10;i++)bullets.push({x:270,y:515,vx:rnd(-230,230),vy:rnd(-260,260),r:9,c:"#c96cff",k:"split",life:1.05});
if(id===4)for(let i=0;i<7;i++)bullets.push({x:rnd(A.x+50,A.x+A.w-50),y:rnd(A.y+40,A.y+A.h-40),vx:0,vy:0,r:18,c:"#101018",k:"black"});

 if(b.k==="black"){const dx=b.x-heart.x,dy=b.y-heart.y,l=Math.hypot(dx,dy)||1;heart.x+=dx/l*38*dt;heart.y+=dy/l*38*dt}

 if(b.k==="spiral"){const ang=b.spin*dt,ox=b.vx,oy=b.vy;b.vx=ox*Math.cos(ang)-oy*Math.sin(ang);b.vy=ox*Math.sin(ang)+oy*Math.cos(ang);b.vx*=1.004;b.vy*=1.004}
 if(b.k==="bounce"&&b.y>arena.y+arena.h-10&&b.vy>0&&b.b>0){b.vy*=-.82;b.b--}
 if(b.k==="mine"){
   b.timer-=dt;

     b.timer=-999;
     for(let j=0;j<8;j++){const a=j*Math.PI/4;pending.push({x:b.x,y:b.y,vx:Math.cos(a)*190,vy:Math.sin(a)*190,r:5,c:"#ffe76a",k:"piece",life:2.8})}

 if(b.k==="bell"){b.vx=Math.sin(performance.now()/180+b.phase)*95}
 if(b.k==="zig"){b.vy=Math.sin(performance.now()/115+b.x*.02)*105*b.zig}
 if(b.k==="angel"){
   b.splitAt-=dt;
   if(b.splitAt<0&&b.splitAt>-100){
     b.splitAt=-999;
     for(let j=0;j<3;j++)pending.push({x:b.x,y:b.y,vx:(j-1)*135,vy:165,r:5,c:"#bde8ff",k:"piece",life:2.8})
   }
 }
 if(b.k==="ring"){b.r+=b.grow*dt;b.life-=dt}
 if(b.k==="blink"){b.timer-=dt;if(b.timer<0){b.timer=.45;b.on=!b.on;b.fake=!b.on}}
 if(b.k==="snake"){b.phase+=dt*6;b.vy=Math.sin(b.phase)*135}
 if(b.k==="clone"){
   b.timer-=dt;
   if(b.timer<0&&b.timer>-100){
     b.timer=-999;
     for(let j=0;j<6;j++){const a=j*Math.PI/3;pending.push({x:b.x,y:b.y,vx:Math.cos(a)*165,vy:Math.sin(a)*165,r:5,c:"#d6b2ff",k:"piece",life:2.8})}
   }
 }
 if(b.k==="halo"){b.vx*=1.003;b.vy*=1.003}
 if(b.life!==undefined)b.life-=dt;

 b.x+=b.vx*dt;b.y+=b.vy*dt;

 if(b.k==="rain"&&b.y>arena.y+arena.h){b.y=arena.y-20;b.x=rnd(arena.x,arena.x+arena.w)}

   }
 }

 if(b.k==="fake"&&b.fake)continue;
 if(b.k==="blink"&&!b.on)continue;
 if(Math.hypot(b.x-heart.x,b.y-heart.y)<b.r+heart.r&&heart.inv<=0){
   hurt(boss.phase===3?25:boss.phase===2?19:15);

 }
}

if(pending.length){

bullets=bullets.filter(b=>{

});

}

for(const h of holes)if(worldX>h[0]&&worldX<h[1])ground=850;
const floating=[[210,610,130],[520,560,150],[950,600,150],[1160,540,145]];

}

platform.x=clamp(platform.x,55,360);

function R(x,y,w,h,c){g.fillStyle=c;g.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h))}
function T(s,x,y,z=18,c="#fff",a="left"){g.fillStyle=c;g.font=`900 ${z}px monospace`;g.textAlign=a;g.fillText(s,x,y)}
function wrapped(s,x,y,maxW,lineH=24,size=16){
g.font=`900 ${size}px monospace`;g.textAlign="center";const chars=[...String(s)];let line="",lines=[];
for(const ch of chars){const test=line+ch;if(g.measureText(test).width>maxW&&line){lines.push(line);line=ch}else line=test}
if(line)lines.push(line);lines.slice(0,4).forEach((v,i)=>T(v,x,y+i*lineH,size,"#fff","center"));
}
function drawBoss(){

g.save();g.translate(270+recoil,205+hover);g.rotate(tilt);g.scale(scale,scale);

if(bossFx.charge>0){

 }

}

const bodyPulse=1+Math.sin(performance.now()/140)*.025;

R(-65,-50,130,118,bossFx.hit>0?"#b8c6d6":"#7c8896");
R(-51,-37,102,90,boss.phase===3?"#250912":"#171d25");

g.beginPath();g.moveTo(0,-105-flap*.15);g.lineTo(-50,-30);g.lineTo(50,-30);g.closePath();g.fill();

else{

 R(-8+eyeX,-60,16,12,boss.phase===3?"#ff5074":"#56bdff");R(-3+eyeX,-56,6,6,"#000");
}
