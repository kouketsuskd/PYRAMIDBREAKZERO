Game.updateBullets=function(dt){
 const G=Game,phaseSpeed=G.boss.phase===5?1.55:1,slow=(G.slowTurns>0?.58:1)*phaseSpeed,pending=[];G.patternClock+=dt;G.bossFx.coreOpen=Math.max(0,G.bossFx.coreOpen-dt);G.bossFx.eyeBeam=Math.max(0,G.bossFx.eyeBeam-dt);
 if(G.patternClock>3&&G.bullets.length<80){G.patternClock=0;G.spawnPattern((G.patternId+1+Math.floor(Math.random()*7))%40)}
 for(const b of G.bullets){
  if(b.warn>0){b.warn-=dt;continue}
  if(b.k==="homing"){const dx=G.heart.x-b.x,dy=G.heart.y-b.y,l=Math.hypot(dx,dy)||1;b.vx+=dx/l*90*dt;b.vy+=dy/l*90*dt}
  if(b.k==="spiral"){const a=b.spin*dt,ox=b.vx,oy=b.vy;b.vx=ox*Math.cos(a)-oy*Math.sin(a);b.vy=ox*Math.sin(a)+oy*Math.cos(a)}
  if(b.k==="blade")b.vx=Math.sin(G.time*5+b.wave)*95;
  if(b.k==="mine"){b.timer-=dt;if(b.timer<0&&b.timer>-100){b.timer=-999;for(let j=0;j<8;j++){const a=j*Math.PI/4;pending.push({x:b.x,y:b.y,vx:Math.cos(a)*215,vy:Math.sin(a)*215,r:5,c:"#ffe05e",k:"piece",life:2.4})}}}
  if(b.k==="split"){b.life-=dt;if(b.life<0&&b.life>-100){b.life=-999;for(let j=0;j<4;j++){const a=j*Math.PI/2;pending.push({x:b.x,y:b.y,vx:Math.cos(a)*200,vy:Math.sin(a)*200,r:5,c:"#ff9be0",k:"piece",life:2.2})}}}
  if(b.k==="zig")b.vy=Math.sin(G.time*7+b.phase)*130;
  if(b.k==="drill"){const a=b.spin*dt,ox=b.vx,oy=b.vy;b.vx=ox*Math.cos(a)-oy*Math.sin(a);b.vy=ox*Math.sin(a)+oy*Math.cos(a)}
  if(b.k==="clone"){b.timer-=dt;if(b.timer<=0){const dx=G.heart.x-b.x,dy=G.heart.y-b.y,l=Math.hypot(dx,dy)||1;b.vx=dx/l*220;b.vy=dy/l*220;b.timer=999}}
  if(b.life!==undefined)b.life-=dt;b.x+=b.vx*dt*slow;b.y+=b.vy*dt*slow;
  if(b.k==="fake"&&b.fake)continue;
  if(Math.hypot(b.x-G.heart.x,b.y-G.heart.y)<b.r+G.heart.r&&G.heart.inv<=0){G.hurt([0,20,25,31,38,46][G.boss.phase]);G.heart.inv=.7;G.particle(G.heart.x,G.heart.y,"#ff435d",14,1.2);G.shake=9}
 }
 G.bullets.push(...pending.slice(0,Math.max(0,120-G.bullets.length)));G.bullets=G.bullets.filter(b=>b&&(b.life===undefined||b.life>0)&&b.x>G.arena.x-180&&b.x<G.arena.x+G.arena.w+180&&b.y>G.arena.y-180&&b.y<G.arena.y+G.arena.h+180);if(G.bullets.length>120)G.bullets.length=120;
};

const _drawCinematicFinal=Game.draw;
Game.draw=function(){
 _drawCinematicFinal();
 const G=Game,g=G.ctx;

 if(G.boss.hp<=G.boss.max/2&&G.boss.hp>0){
  g.save();
  g.shadowColor="#ff3858";g.shadowBlur=14;
  G.T("ENEMY ATK ↑",48,130,11,"#ff667d","left");
  g.restore();
 }

 if(G.state==="WORLD_UNLOCK_CINEMA"&&G.worldUnlockCinema>0){
  const elapsed=3.8-G.worldUnlockCinema;
  g.save();
  g.fillStyle="rgba(0,0,8,.72)";g.fillRect(0,0,540,960);
  g.translate(270,470);
  g.shadowColor="#cdbdff";g.shadowBlur=38;
  g.strokeStyle="#d8c8ff";
  for(let i=0;i<9;i++){
   const pulse=10*Math.sin(elapsed*3+i*.7);
   g.lineWidth=i%2?3:6;
   g.beginPath();g.arc(0,0,55+i*28+pulse,0,Math.PI*2);g.stroke();
  }
  for(let i=0;i<12;i++){
   const a=i*Math.PI/6+elapsed*.22;
   g.save();g.rotate(a);g.fillStyle="#f5efff";g.fillRect(-3,-220,6,24);g.restore();
  }
  g.lineWidth=9;g.beginPath();g.moveTo(0,0);g.lineTo(0,-145);g.stroke();
  g.lineWidth=5;g.beginPath();g.moveTo(0,0);g.lineTo(105,25);g.stroke();
  g.restore();
  g.save();g.shadowColor="#000";g.shadowBlur=20;
  
  
  g.restore();
 }

 if(G.state==="BOSS_DEATH_CINEMA"&&G.deathCinema>0){
  const elapsed=4.4-G.deathCinema;
  const progress=G.clamp(elapsed/4.4,0,1);
  g.save();
  g.fillStyle=`rgba(0,0,0,${.18+progress*.45})`;g.fillRect(0,0,540,960);

  // Expanding fractures from the boss core.
  g.translate(270,205);
  g.shadowColor="#9fe8ff";g.shadowBlur=28;
  for(let i=0;i<18;i++){
   const a=i*Math.PI*2/18+i*.21;
   const len=(35+i%5*15)+progress*210;
   g.strokeStyle=i%3===0?"#ff637c":"#dff8ff";
   g.lineWidth=i%4===0?5:2;
   g.beginPath();g.moveTo(Math.cos(a)*12,Math.sin(a)*12);
   g.lineTo(Math.cos(a)*len,Math.sin(a)*len);g.stroke();
  }

  // Broken armor fragments.
  for(let i=0;i<34;i++){
   const a=i*.91;
   const dist=progress*(70+(i%8)*24);
   const x=Math.cos(a)*dist,y=Math.sin(a)*dist+progress*progress*80;
   g.save();g.translate(x,y);g.rotate(a+elapsed*2);
   g.globalAlpha=Math.max(0,1-progress*.85);
   g.fillStyle=i%4===0?"#ff5a72":i%3===0?"#d8b967":"#c9d7e5";
   g.fillRect(-6,-3,12+(i%3)*4,6+(i%2)*4);g.restore();
  }

  // Core collapses and flashes.
  const coreR=Math.max(0,28*(1-progress));
  g.globalAlpha=1-progress*.35;
  g.fillStyle="#74ddff";g.beginPath();g.arc(0,12,coreR,0,Math.PI*2);g.fill();
  g.restore();

  if(progress>.72){
   const a=(progress-.72)/.28;
   g.fillStyle=`rgba(255,255,255,${Math.sin(a*Math.PI)*.75})`;g.fillRect(0,0,540,960);
  }
  g.save();g.shadowColor="#000";g.shadowBlur=18;
  G.T(progress<.55?"装甲崩壊":"コア停止",270,852,progress<.55?24:30,progress<.55?"#dff8ff":"#ff6b80","center");
  
  g.restore();
 }
};
