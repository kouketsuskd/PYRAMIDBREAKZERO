<script>
(()=>{"use strict";

const K={u:0,d:0,l:0,r:0,ok:0,bk:0},cl=(v,a,b)=>Math.max(a,Math.min(b,v)),rr=(a,b)=>a+Math.random()*(b-a);

const P=[
{name:"トシユキ",max:110,hp:110,mp:70,mm:70,c:"#6958a7",skill:"ザ・ワールド",q:"時間は止められる。でも、想いまでは止められない。",pow:18,spd:1},
{name:"カズアキ",max:180,hp:180,mp:45,mm:45,c:"#70483d",skill:"ワールド・イズ・マイン",q:"全部背負う。それが俺の役目だ。",pow:34,spd:.82},
{name:"マッピー",max:105,hp:105,mp:85,mm:85,c:"#caa25a",skill:"ピラミッド・ハート",q:"勝つんじゃない。みんなで帰るんだ。",pow:15,spd:1},

{name:"リョウゴ",max:120,hp:120,mp:75,mm:75,c:"#3d86bf",skill:"虫の知らせ",q:"未来は決まってない。だから見に行く。",pow:21,spd:1.3}
];

const acts=["たたかう","わざ","どうぐ","まもる","はなす","こうたい"];
function ac(){if(!audio)audio=new(window.AudioContext||window.webkitAudioContext)}
function beep(f=220,d=.08,t="square",v=.025){if(!audio)return;let o=audio.createOscillator(),a=audio.createGain();o.type=t;o.frequency.value=f;a.gain.value=v;o.connect(a);a.connect(audio.destination);o.start();a.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+d);o.stop(audio.currentTime+d)}
function music(){if(mus)return;let i=0;mus=setInterval(()=>{let q=mood==="quiet"?[220,277,330,277,247,220,196,220]:mood==="hope"?[196,247,294,392,330,294,247,294,220,277,330,440,392,330,294,277]:mood==="despair"?[82,98,110,123,110,98,73,82]:[110,147,165,196,220,196,165,147,123,165,185,247,220,196,165,147];beep(q[i++%q.length],.16,mood==="quiet"?"sine":"square",mood==="quiet"?.018:.014)},165)}
function say(a,f=null){dialog=Array.isArray(a)?a:[a];di=0;sub="dialog";after=f}
function nxt(){di++;if(di>=dialog.length){sub="choose";if(after){let f=after;after=null;f()}}}
function toast(s,t=1.1){msg=s;mt=t}
function part(x,y,c,n=12,p=1){for(let i=0;i<n;i++)parts.push({x,y,vx:rr(-180,180)*p,vy:rr(-220,80)*p,l:rr(.3,.7),c,s:rr(2,6)})}
function cur(){if(P[active].hp<=0){let i=P.findIndex(p=>p.hp>0);active=i<0?0:i}return P[active]}
function reset(){P.forEach(p=>{p.hp=p.max;p.mp=p.mm});Object.assign(B,{hp:B.max,phase:1,armor:8,resolve:100,weak:"none",mercy:0});Object.assign(I,{herb:5,dew:3,leaf:2,ether:3});S="opening";sub="dialog";turn=0;sel=0;active=0;bond=0;score=0;bullets=[];parts=[];freeze=foresee=guard=phoenix=world=berserk=0;mood="quiet";say(["――空から、壊れた神が落ちてきた。","その翼は祈りではなく、命令で動いていた。","機械天使「私は、終わらせるために作られた。」","トシユキ「じゃあ俺たちは、始めるために来た。」"],()=>{S="menu";sub="choose";toast("六人の物語が始まる。",1.4)})}
function dmg(n){n=Math.max(1,Math.floor(n-B.armor));B.hp-=n;score+=n*10;part(480,130,"#fff",22,1.3);beep(85,.15,"square",.07);shake=10;if(B.hp<=0){B.hp=0;ending(false)}}
function choose(){if(sub!=="choose")return;if(S==="menu"){if(sel===0){S="attack";atk=230;adir=1}if(sel===1){S="skill";sel=0}if(sel===2){S="item";sel=0}if(sel===3){guard=1;bond=Math.min(100,bond+12);say([cur().name+"は仲間の前に立った。","「ここは俺が受ける。」"],defense)}if(sel===4)talk();if(sel===5){S="switch";sel=0}}else if(S==="skill")skill();else if(S==="item")item();else if(S==="switch"){if(P[sel].hp>0){active=sel;S="menu";sel=0;toast(cur().name+"に交代")}else toast("戦闘不能")}}
function skill(){let p=cur(),cost=[25,30,30,30,28,24][active];if(p.mp<cost)return toast("MPが足りない");p.mp-=cost;flash=.15;shake=9;
if(active===0){if(world){freeze=2.2;dmg(35);say([p.q,"止まった世界で、仲間の傷が少し癒えた。"],()=>{P.forEach(a=>a.hp=Math.min(a.max,a.hp+18));defense()})}else{world=1;freeze=4.5;bond=Math.min(100,bond+20);P.forEach(a=>{if(a.hp<=0)a.hp=Math.ceil(a.max*.35)});say([p.q,"倒れた仲間たちの時間が、もう一度だけ動き出す。"],defense)}}
if(active===1){p.hp=Math.max(1,p.hp-Math.ceil(p.max*.22));B.armor=0;dmg(145);bond=Math.min(100,bond+14);say([p.q,"カズアキは自分の命を刃に変えた。"],defense)}
if(active===2){P.forEach(a=>a.hp=Math.min(a.max,a.hp+34));bond=Math.min(100,bond+20);B.mercy+=15;say([p.q,"黄金の結界が六人を包んだ。"],defense)}
if(active===3){if(!phoenix){phoenix=1;P.forEach(a=>a.hp=a.hp<=0?Math.ceil(a.max*.55):Math.min(a.max,a.hp+28));p.hp=1;bond=Math.min(100,bond+25);say([p.q,"不死鳥は灰の中から、仲間の名前を呼んだ。"],defense)}else{dmg(B.weak==="fire"?160:95);say([p.q,"炎は破壊ではなく、帰る道を照らした。"],defense)}}
if(active===4){berserk=3;dmg(105);bond=Math.min(100,bond+8);say([p.q,"鬼の力がイサジの理性を飲み込もうとする。"],defense)}
if(active===5){foresee=1;B.weak=["fire","power","heart"][Math.floor(Math.random()*3)];bond=Math.min(100,bond+16);dmg(48);say([p.q,"次の弾幕の軌道が、青い残像として見える。"],defense)}}
function item(){let p=cur();if(sel===0){if(!I.herb)return toast("やくそうがない");I.herb--;p.hp=Math.min(p.max,p.hp+55);bond=Math.min(100,bond+6);say([p.name+"はやくそうを使った。","苦い味が、生きていることを思い出させた。"],defense)}if(sel===1){if(!I.dew)return toast("しずくがない");I.dew--;P.forEach(a=>a.hp=Math.min(a.max,a.hp+42));bond=Math.min(100,bond+14);say(["せかいじゅのしずくが、六人の傷に降り注いだ。"],defense)}if(sel===2){if(!I.leaf)return toast("葉がない");let d=P.find(a=>a.hp<=0);if(!d)return toast("今は必要ない");I.leaf--;d.hp=Math.ceil(d.max*.6);bond=Math.min(100,bond+18);say([d.name+"は、遠い声に呼び戻された。"],defense)}if(sel===3){if(!I.ether)return toast("せいすいがない");I.ether--;p.mp=Math.min(p.mm,p.mp+45);say([p.name+"のMPが回復した。"],defense)}}
function talk(){let q=[["マッピー「あなたは、誰かに止めてほしいんじゃないのか？」","機械天使「……命令に、願いは必要ない。」"],["リョウゴ「未来には、君が泣いている姿が見える。」","機械天使「私は、泣く機能を持たない。」"],["ケイタ「機能じゃなくても、痛いものは痛い。」","翼の一枚が、わずかに震えた。"],["トシユキ「帰りたい気持ちを選べ。」","機械天使「帰る場所など、私にはない。」"],["イサジ「なら作ればいい。俺たちもそうしてきた。」","機械天使の瞳から、光が一滴こぼれた。"]],i=Math.min(q.length-1,Math.floor(B.mercy/20));B.mercy+=20;bond=Math.min(100,bond+15);B.resolve=Math.max(0,B.resolve-18);say(q[i],()=>{if(B.resolve<=0&&bond>=70)ending(true);else defense()})}
function attack(dt){atk+=adir*dt*420;if(atk>730){atk=730;adir=-1}if(atk<230){atk=230;adir=1}if(K.ok){K.ok=0;let q=1-Math.abs(480-atk)/250,m=cur().pow*(.7+cl(q,0,1)*1.8);if((active===3&&B.weak==="fire")||(active===1&&B.weak==="power")||(active===2&&B.weak==="heart"))m*=1.35;if(berserk&&active===4)m*=1.8;dmg(m);toast(q>.88?"PERFECT!":q>.55?"GOOD!":"HIT");setTimeout(defense,650)}}
function link(){bond=0;flash=.35;shake=16;mood="hope";say(["絆が、六人の心を一つにつないだ。","トシユキ「止める。」――時が静止する。","カズアキ「俺が道を作る。」――装甲が断たれる。","リョウゴ「未来は見えた。」――弱点が光る。","イサジ「全部ぶっ壊す。」――鬼の拳が空を裂く。","ケイタ「終わらせよう。」――不死鳥が夜を焼く。","マッピー「みんな、帰ろう。」","六人連携奥義――『DAYBREAK』"],()=>{dmg(520);if(B.hp>0)defense()})}
function defense(){if(B.hp<=0)return;if(bond>=100)return link();S="def";sub="play";def=B.phase===3?8.5:B.phase===2?7.2:6.2;bullets=[];Object.assign(Ht,{x:480,y:386,inv:.5,mode:B.phase===2?"blue":"red",vy:0});pattern()}
function pattern(){if(B.phase===1){for(let i=0;i<12;i++)bullets.push({x:220+i*47,y:282-rr(0,80),vx:rr(-25,25),vy:115+rr(0,60),r:6,c:"#eaf4ff",k:"f"});for(let i=0;i<4;i++)bullets.push({x:480,y:385,vx:Math.cos(i*Math.PI/2)*120,vy:Math.sin(i*Math.PI/2)*120,r:7,c:"#ffd45b",k:"g"})}else if(B.phase===2){for(let i=0;i<18;i++){let a=i*Math.PI*2/18;bullets.push({x:480+Math.cos(a)*210,y:385+Math.sin(a)*100,vx:-Math.cos(a)*150,vy:-Math.sin(a)*150,r:7,c:"#b8d7ff",k:"o"})}bullets.push({x:180,y:320,vx:210,vy:0,r:9,c:"#ff6b7d",k:"h"},{x:780,y:450,vx:-210,vy:0,r:9,c:"#ff6b7d",k:"h"})}else{for(let i=0;i<22;i++){let s=i%2,y=286+(i%11)*18;bullets.push({x:s?770:190,y,vx:s?-220:220,vy:Math.sin(i)*55,r:6,c:i%4===0?"#ffd45b":"#fff",k:"l"})}for(let i=0;i<7;i++)bullets.push({x:480,y:385,vx:rr(-260,260),vy:rr(-220,220),r:8,c:"#d46bff",k:"c"})}}
function hurt(n){if(guard){n=Math.ceil(n*.55);bond=Math.min(100,bond+4)}let p=cur();p.hp-=n;if(p.hp<=0){p.hp=0;let a=P.filter(x=>x.hp>0);if(!a.length)return over();active=P.indexOf(a[0])}}
function defup(dt){if(freeze>0){freeze-=dt;def-=dt*.25;return}let dx=(K.l?-1:0)+(K.r?1:0),dy=(K.u?-1:0)+(K.d?1:0),sp=Ht.spd*cur().spd;if(Ht.mode==="blue"){Ht.vy+=580*dt;if(K.u&&Ht.y>410)Ht.vy=-290;Ht.x=cl(Ht.x+dx*sp*dt,202,758);Ht.y=cl(Ht.y+Ht.vy*dt,285,480);if(Ht.y>=480){Ht.y=480;Ht.vy=0}}else{Ht.x=cl(Ht.x+dx*sp*dt,202,758);Ht.y=cl(Ht.y+dy*sp*dt,285,480)}
for(const b of bullets){if(b.k==="h"){let ax=Ht.x-b.x,ay=Ht.y-b.y,l=Math.hypot(ax,ay)||1;b.vx+=ax/l*80*dt;b.vy+=ay/l*80*dt}if(b.k==="g"){let ax=b.x-480,ay=b.y-385;b.vx+=-ay*dt*2;b.vy+=ax*dt*2}b.x+=b.vx*dt;b.y+=b.vy*dt;if(b.k==="f"&&b.y>490){b.y=280;b.x=rr(205,755)}if(Math.hypot(b.x-Ht.x,b.y-Ht.y)<b.r+Ht.r&&Ht.inv<=0){hurt(B.phase===3?22:B.phase===2?17:13);Ht.inv=.85;part(Ht.x,Ht.y,"#ff4c61",12);shake=8}}
Ht.inv=Math.max(0,Ht.inv-dt);def-=dt;if(def<=0){foresee=guard=0;berserk=Math.max(0,berserk-1);next()}}
function next(){turn++;B.phase=B.hp<720?3:B.hp<1550?2:1;if(B.phase===2)mood="battle";if(B.phase===3)mood="despair";active=(active+1)%P.length;if(P[active].hp<=0){let i=P.findIndex(p=>p.hp>0);active=i}cur().mp=Math.min(cur().mm,cur().mp+8);S="menu";sub="choose";sel=0;bullets=[];toast(cur().name+"のターン")}
function ending(peace){S="ending";mood="hope";say(peace?["機械天使は、武器を降ろした。","機械天使「私も、朝を見てもいいのですか？」","六人「もちろん。」","翼から外れた歯車は、花びらのように舞った。","トシユキ「今日は、いい日になりそうだ。」"]:["最後の一撃が、機械天使の胸を貫いた。","けれど誰も、勝ったとは思わなかった。","機械天使「ありがとう……ようやく眠れる。」","マッピー「眠るんじゃない。次は朝を見に行こう。」"],finish)}
function finish(){S="end";document.getElementById("et").textContent="DAYBREAK";document.getElementById("ep").textContent="誰も勝者ではなかった。\\nただ、七人は朝日を見た。\\nSCORE "+score;document.getElementById("end").classList.remove("hidden")}
function over(){S="end";document.getElementById("et").textContent="GAME OVER";document.getElementById("ep").textContent="それでも、物語はここで終わらない。";document.getElementById("end").classList.remove("hidden")}
function input(){if(sub==="dialog"){if(K.ok){K.ok=0;nxt()}return}if(S==="menu"){if(K.l){sel=(sel+5)%6;K.l=0}if(K.r){sel=(sel+1)%6;K.r=0}if(K.u){sel=(sel+4)%6;K.u=0}if(K.d){sel=(sel+2)%6;K.d=0}if(K.ok){K.ok=0;choose()}}else if(S==="item"||S==="switch"||S==="skill"){let m=S==="item"?4:S==="switch"?6:1;if(K.u){sel=(sel+m-1)%m;K.u=0}if(K.d){sel=(sel+1)%m;K.d=0}if(K.ok){K.ok=0;choose()}if(K.bk){K.bk=0;S="menu";sel=0}}}
function upd(dt){mt=Math.max(0,mt-dt);shake*=.86;flash=Math.max(0,flash-dt);parts.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=420*dt;p.l-=dt});parts=parts.filter(p=>p.l>0);input();if(S==="attack")attack(dt);if(S==="def")defup(dt)}
function R(x,y,w,h,c){X.fillStyle=c;X.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h))}function T(s,x,y,z=18,c="#fff",a="left"){X.fillStyle=c;X.font=`900 ${z}px monospace`;X.textAlign=a;X.fillText(s,x,y)}
